<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<title>좀비 헌팅 RPG · 논현 모임</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
:root{--p:#8a35c0;--pd:#5a1f86;--gold:#e6c964;--ink:#ece4f5;--mut:#a394bd;--line:rgba(160,95,208,.2);--cardbg:rgba(255,255,255,.04)}
body{font-family:"Pretendard Variable",Pretendard,system-ui,sans-serif;color:var(--ink);min-height:100vh;
 background:radial-gradient(130% 75% at 50% -8%,#341a52 0%,#211036 46%,#150a22 82%,#0c0418 100%);}
.app{max-width:460px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;
 padding-bottom:calc(70px + env(safe-area-inset-bottom))}
/* top bar */
.topbar{position:sticky;top:0;z-index:30;padding:10px 14px 11px;
 background:linear-gradient(180deg,rgba(21,10,34,.96),rgba(21,10,34,.7));backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.trow{display:flex;align-items:center;gap:8px}
.tlv{font-size:12.5px;font-weight:800;color:#fff;background:linear-gradient(135deg,var(--p),var(--pd));padding:4px 10px;border-radius:8px}
.tpow{margin-left:auto;display:flex;align-items:center;gap:5px;font-size:13.5px;font-weight:800;color:var(--gold);
 background:rgba(201,162,39,.13);padding:5px 11px;border-radius:9px;cursor:pointer}
.cur{display:flex;gap:12px;margin-top:9px;font-size:12px;font-weight:700}
.cur span{display:flex;align-items:center;gap:4px;color:#d9cdec}
.cur b{font-weight:800;color:#fff}
.tbar{height:5px;border-radius:4px;background:rgba(0,0,0,.4);overflow:hidden;margin-top:8px;position:relative}
.tbar i{display:block;height:100%;background:linear-gradient(90deg,#a05fd0,#d6a6f0);transition:width .4s cubic-bezier(.16,1,.3,1)}
.enwrap{display:flex;align-items:center;gap:8px;margin-top:7px}
.enwrap .ebar{flex:1;height:9px;border-radius:6px;background:rgba(0,0,0,.4);overflow:hidden}
.enwrap .ebar i{display:block;height:100%;background:linear-gradient(90deg,#46c46e,#7fe0a0);transition:width .4s}
.enwrap .etx{font-size:10.5px;font-weight:800;color:#8fe0a8}
/* content */
.content{flex:1;padding:14px 14px 8px}
.pane{display:none}
.card{background:var(--cardbg);border:1px solid var(--line);border-radius:16px;padding:15px;margin-bottom:12px}
.ttl{font-size:16px;font-weight:800;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.ttl2{font-size:14px;font-weight:800;display:flex;align-items:center;gap:8px;margin-bottom:11px}
.ttl2 .muted{font-weight:700}
.muted{color:var(--mut)}.small{font-size:12px}
.pow2{margin-left:auto;font-size:12px;font-weight:800;color:var(--gold)}
.bigbtn{width:100%;border:none;cursor:pointer;font-family:inherit;font-weight:800;font-size:15.5px;color:#fff;padding:14px;border-radius:13px;
 background:linear-gradient(135deg,var(--p),var(--pd));box-shadow:0 8px 24px rgba(138,53,192,.4);position:relative;transition:transform .15s}
.bigbtn:active{transform:scale(.98)}
.bigbtn.gold{background:linear-gradient(135deg,#caa12c,#9a7b15);color:#2a2005;box-shadow:0 8px 24px rgba(201,162,39,.34)}
.bigbtn.alt{background:rgba(255,255,255,.06);color:#d9cdec;box-shadow:none}
.bigbtn:disabled{background:#3a2d50;color:#7d6e9a;box-shadow:none}
.bigbtn .cost{font-size:12.5px;opacity:.85;margin-left:6px}
.bigbtn .badge{background:#ff5d6c;color:#fff;font-size:11px;padding:1px 7px;border-radius:999px;margin-left:6px}
/* hunt */
.scene{position:relative;border-radius:14px;overflow:hidden;border:1px solid var(--line);box-shadow:0 12px 36px rgba(0,0,0,.4);margin-bottom:12px}
.scene canvas{display:block;width:100%;image-rendering:pixelated;image-rendering:crisp-edges}
.stagebar{display:flex;align-items:flex-end;justify-content:space-between;font-size:14px;font-weight:700;margin-bottom:7px}
.stagebar b{color:#fff}.bossw{color:#ff6b6b;font-weight:800;font-size:11px;margin-left:5px}
.stageprog{height:8px;border-radius:5px;background:rgba(0,0,0,.4);overflow:hidden;margin-bottom:12px}
.stageprog i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),#f0d472);transition:width .4s}
.huntbtns{display:flex;gap:10px}.huntbtns .bigbtn{flex:1}
/* gacha */
.pity{font-size:12px;font-weight:700;color:#d3b8f0;background:rgba(160,95,208,.12);padding:8px 12px;border-radius:9px;margin:6px 0 10px}
.rates{font-size:11px;font-weight:700;line-height:1.9;margin-bottom:14px}
.gbtns{display:flex;gap:10px}.gbtns .bigbtn{flex:1}
/* slots */
.equiptop{display:flex;gap:12px}
.portrait{flex:none;width:104px;background:rgba(0,0,0,.18);border:1px solid var(--line);border-radius:12px;display:grid;place-items:center;padding:6px}
.portrait canvas{image-rendering:pixelated;width:90px}
.slots{flex:1;display:flex;flex-direction:column;gap:6px}
.slot{display:flex;align-items:center;gap:9px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:7px 9px}
.slot .si{width:28px;height:28px;border-radius:7px;display:grid;place-items:center;flex:none;background:rgba(160,95,208,.16);color:#d3b8f0}
.slot .si svg{width:16px;height:16px}.sl-b{flex:1;min-width:0}
.sn{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ss{font-size:10.5px;font-weight:700;margin-top:1px}
/* mini btn */
.mini{border:none;font-family:inherit;font-weight:800;font-size:11.5px;color:#fff;background:rgba(160,95,208,.28);
 border:1px solid rgba(160,95,208,.45);padding:7px 11px;border-radius:9px;cursor:pointer;white-space:nowrap}
.mini:active{transform:scale(.96)}
.mini.gray{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.12);color:#bca9d6}
.mini.gold{background:linear-gradient(135deg,#caa12c,#9a7b15);border:none;color:#2a2005}
.mini.risk{background:rgba(192,71,107,.2);border-color:rgba(192,71,107,.5);color:#f0a8bd}
.mini:disabled{opacity:.45}
/* inventory */
.invlist{display:flex;flex-direction:column;gap:8px}
.iitem{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.03);border:1.5px solid var(--c,#444);border-radius:11px;padding:9px 10px}
.iitem .ii{width:34px;height:34px;border-radius:8px;display:grid;place-items:center;flex:none;background:rgba(0,0,0,.25);color:var(--c)}
.iitem .ii svg{width:19px;height:19px}.ib{flex:1;min-width:0}
.inm{font-size:13px;font-weight:700}.ir{font-size:11px;color:var(--mut);margin-top:1px}
.ir .up{color:#7fe0a0;font-weight:800}.ir .dn{color:#f0a8bd;font-weight:800}
.iacts{display:flex;gap:6px;flex:none}
.emptybox{text-align:center;color:#7d6e9a;font-size:13px;padding:26px 14px;line-height:1.7}
/* dex */
.dexg{margin-bottom:13px}.dexgl{font-size:11.5px;font-weight:800;color:#b9a8cf;margin-bottom:8px}
.dexgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.dcell{aspect-ratio:1;border-radius:10px;border:1.5px solid var(--c,#333);background:rgba(255,255,255,.03);
 display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--c)}
.dcell svg{width:18px;height:18px}.dcell .dn{font-size:9px;font-weight:700;color:#cbb8e0;line-height:1}
.dcell.lock{opacity:.38}
/* skill */
.skill{display:flex;align-items:center;gap:11px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:11px;padding:10px;margin-bottom:8px}
.skill .ski{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;font-size:17px;flex:none;background:rgba(160,95,208,.15)}
.sk-b{flex:1}.sk-b .sn b{color:var(--gold)}
/* rank */
.seg{display:flex;gap:5px;background:rgba(0,0,0,.25);border-radius:11px;padding:4px;margin-bottom:14px}
.seg button{flex:1;border:none;font-family:inherit;font-weight:800;font-size:11.5px;color:var(--mut);padding:9px 2px;border-radius:8px;cursor:pointer;background:none}
.seg button.on{background:linear-gradient(135deg,var(--p),var(--pd));color:#fff}
.myrank{display:flex;align-items:center;justify-content:space-between;background:rgba(160,95,208,.14);border:1px solid var(--line);border-radius:11px;padding:11px 14px;margin-bottom:8px;font-size:13px;font-weight:700}
.myrank b{color:var(--gold);font-size:16px}.myrank .mv{font-weight:800;color:#fff}
.chase{font-size:12px;font-weight:600;color:#d3b8f0;background:rgba(255,255,255,.04);border-radius:9px;padding:9px 12px;margin-bottom:14px}
.chase b{color:#fff;font-weight:800}
.podium{display:grid;grid-template-columns:1fr 1.2fr 1fr;gap:8px;align-items:end;margin-bottom:14px}
.pod{border-radius:13px;padding:13px 6px;text-align:center;position:relative;overflow:hidden}
.pod .pmed{font-size:13px;font-weight:900;margin-bottom:5px;color:#bca9d6}
.pod .pav{width:42px;height:42px;border-radius:50%;margin:0 auto 6px;display:grid;place-items:center;font-weight:800;font-size:16px;color:#fff;background:linear-gradient(135deg,#8a8090,#666)}
.pod .pn{font-size:11px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pod .pv{font-size:11.5px;font-weight:900;margin-top:2px}
.pod.p1{background:linear-gradient(165deg,rgba(201,162,39,.18),rgba(201,162,39,.04));border:1px solid rgba(201,162,39,.4);padding-top:18px}
.pod.p1 .pmed{color:var(--gold)}.pod.p1 .pav{width:48px;height:48px;background:linear-gradient(135deg,#e6c964,#c9a227);color:#3a2c05}.pod.p1 .pv{color:#e6c964}
.pod.p2,.pod.p3{background:rgba(255,255,255,.04);border:1px solid var(--line)}
.pod.p3 .pav{background:linear-gradient(135deg,#cd9a6f,#b07c4f)}.pod .pv{color:#cbb8e0}
.rlist{display:flex;flex-direction:column}
.rrow{display:flex;align-items:center;gap:11px;padding:10px 6px;border-bottom:1px solid rgba(255,255,255,.05)}
.rrow .rno{width:26px;text-align:center;font-weight:900;color:#8d7caa;font-size:13px}
.rrow .rnm{flex:1;font-weight:700;font-size:13.5px}.rrow .rmeta{color:var(--mut);font-weight:600;font-size:11px}
.rrow .rval{font-weight:900;color:#d3b8f0}.rrow .op{color:var(--gold)}
.rrow.meRow{background:rgba(160,95,208,.16);border-radius:9px;border-bottom:none}
.rrow.meRow .rnm,.rrow.meRow .rval{color:#fff}
.arow{display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.arow .aav{width:36px;height:36px;border-radius:50%;display:grid;place-items:center;font-weight:800;color:#fff;background:linear-gradient(135deg,#8a35c0,#5a1f86);flex:none}
.arow .ab{flex:1}.arow .anm{font-weight:700;font-size:13.5px}
/* tabbar */
.tabbar{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:460px;z-index:40;
 height:calc(66px + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);display:flex;
 background:rgba(20,11,32,.92);backdrop-filter:blur(16px);border-top:1px solid var(--line)}
.tabbtn{flex:1;border:none;background:none;cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
 color:#8d7caa;font-size:10.5px;font-weight:700;position:relative}
.tabbtn .ic{font-size:19px;line-height:1}
.tabbtn.on{color:#e0c4f7}
.tabbtn.on::before{content:"";position:absolute;top:0;width:24px;height:3px;border-radius:0 0 3px 3px;background:var(--p)}
/* overlays */
.overlay{position:fixed;inset:0;background:rgba(8,4,16,.8);backdrop-filter:blur(4px);display:none;place-items:center;z-index:60;padding:18px}
.overlay.show{display:grid;animation:ovin .25s ease}
@keyframes ovin{from{opacity:0}to{opacity:1}}
.rcard{width:228px;border-radius:24px;padding:26px 20px 20px;text-align:center;position:relative;background:#1c0f30;border:2px solid var(--c,#888);
 box-shadow:0 0 50px -8px var(--c),0 20px 60px rgba(0,0,0,.6);animation:rpop .5s cubic-bezier(.16,1,.3,1)}
@keyframes rpop{0%{opacity:0;transform:scale(.55) rotateY(40deg)}100%{opacity:1;transform:none}}
.ribox{width:90px;height:90px;margin:0 auto 13px;border-radius:18px;display:grid;place-items:center;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.08);color:var(--c)}
.ribox svg{width:52px;height:52px}
.rr{font-size:12px;font-weight:800;letter-spacing:.1em;color:var(--c)}.rn{font-size:18px;font-weight:800;color:#fff;margin:4px 0 2px}
.rs{font-size:12px;color:var(--mut)}.rp{font-size:13px;font-weight:800;color:var(--gold);margin-top:7px}
.racts{display:flex;gap:8px;margin-top:16px}.racts button{flex:1;border:none;font-family:inherit;font-weight:800;font-size:14px;padding:11px;border-radius:11px;cursor:pointer}
.rq{background:linear-gradient(135deg,var(--p),var(--pd));color:#fff}.rc{background:rgba(255,255,255,.08);color:#cbb8e0;width:100%;margin-top:14px;border:none;font-family:inherit;font-weight:800;font-size:14px;padding:12px;border-radius:11px;cursor:pointer}
.rburst{position:absolute;left:50%;top:38%;width:30px;height:30px;border-radius:50%;border:2px solid var(--c);transform:translate(-50%,-50%);animation:rb .7s ease forwards;pointer-events:none}
@keyframes rb{to{width:320px;height:320px;opacity:0;border-width:1px}}
.rpar{position:absolute;left:50%;top:40%;width:7px;height:7px;border-radius:50%;background:var(--c);pointer-events:none;animation:rp .9s ease forwards}
@keyframes rp{0%{opacity:1;transform:translate(-50%,-50%)}100%{opacity:0;transform:translate(calc(-50% + var(--tx)),calc(-50% + var(--ty)))}}
.tcard{width:300px;max-width:100%;border-radius:22px;padding:22px;background:#1c0f30;border:1px solid var(--line);box-shadow:0 20px 60px rgba(0,0,0,.6)}
.tt{font-size:17px;font-weight:800;margin-bottom:14px;text-align:center}
.mgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-bottom:16px}
.mcell{aspect-ratio:.8;border-radius:9px;border:1.5px solid var(--c);background:rgba(255,255,255,.04);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(--c);padding:3px}
.mcell svg{width:18px;height:18px}.mcell .mn{font-size:7.5px;font-weight:700;color:#cbb8e0;line-height:1;text-align:center}.mcell .mr{font-size:7.5px;font-weight:800}
.mcard{width:300px;max-width:100%;border-radius:22px;padding:22px;background:#1c0f30;border:1px solid var(--line);box-shadow:0 20px 60px rgba(0,0,0,.6)}
.mcard.wc{text-align:center}
.mrow{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.mb{flex:1}.mn2{font-size:13.5px;font-weight:700;margin-bottom:6px}
.mbar{height:7px;border-radius:5px;background:rgba(0,0,0,.4);overflow:hidden;margin-bottom:5px}.mbar i{display:block;height:100%;background:linear-gradient(90deg,var(--p),#b06ff0)}
.wrow{display:flex;justify-content:space-around;margin:16px 0;font-size:12.5px;color:#bca9d6}.wrow b{display:block;font-size:17px;color:var(--gold);font-weight:800}
.flash{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:65}
.flash.go{animation:fl .55s ease forwards}@keyframes fl{0%{opacity:0}14%{opacity:.8}100%{opacity:0}}
.toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%) translateY(16px);background:rgba(26,20,35,.96);color:#fff;font-size:13px;font-weight:600;padding:11px 19px;border-radius:999px;opacity:0;pointer-events:none;transition:.35s cubic-bezier(.16,1,.3,1);z-index:70;box-shadow:0 10px 30px rgba(0,0,0,.5)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.attend{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.acell{position:relative;border-radius:9px;border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.03);padding:7px 2px;text-align:center}
.acell .ad{font-size:9px;font-weight:700;color:#a394bd}
.acell .ar{font-size:10.5px;font-weight:800;margin-top:3px}
.acell.done{opacity:.5}
.acell.done .ack{position:absolute;inset:0;display:grid;place-items:center;font-size:18px;color:#7fe0a0;background:rgba(0,0,0,.4);border-radius:9px}
.acell.today{border-color:var(--gold);cursor:pointer;animation:apulse 1.4s infinite}
@keyframes apulse{0%,100%{box-shadow:0 0 0 1px var(--gold),0 0 6px rgba(230,201,100,.3)}50%{box-shadow:0 0 0 1px var(--gold),0 0 16px rgba(230,201,100,.6)}}
.chestcard{display:flex;align-items:center;justify-content:space-between;gap:10px}
.rmini{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:13px}
.rmini .rmno{width:24px;text-align:center;font-weight:900;color:#8d7caa}
.rmini .rmnm{flex:1;font-weight:700}
.rmini .rmv{font-weight:900;color:#d3b8f0}
.rmini.me{background:rgba(160,95,208,.14);border-radius:8px;border-bottom:none;padding:7px 8px}
.rmini.me .rmnm,.rmini.me .rmv{color:#fff}
.rebbadge{display:inline-block;font-size:9.5px;font-weight:900;color:#1a1228;background:linear-gradient(180deg,#ffe08a,#e6b94d);padding:1px 5px;border-radius:6px;margin-left:4px;vertical-align:middle;box-shadow:0 0 6px rgba(230,201,100,.5)}
.rrow.hasReb .rnm{color:#ffe9b0}
.pod.reb{box-shadow:0 0 0 1px rgba(230,201,100,.5),0 6px 18px rgba(230,201,100,.18)}
.prb{font-size:9.5px;font-weight:900;color:#ffd96b;margin-top:1px}
.rebperk{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:4px 0 10px}
.rebperk>div{background:rgba(230,201,100,.08);border:1px solid rgba(230,201,100,.22);border-radius:9px;padding:9px 11px;font-size:12.5px;font-weight:700;color:#e8d9b0}
.rebperk>div b{color:#ffe08a;float:right}
</style></head>
<body>
<div class="app">
  <div class="topbar">
    <div class="trow">
      <span class="tlv">Lv.<span id="tLv">1</span></span>
      <span id="netDot" style="width:9px;height:9px;border-radius:50%;background:#6b6477;margin-left:7px" title="오프라인(봇 랭킹)"></span>
      <span class="tpow" id="tPowBox">⚔️ <span id="tPow">0</span></span>
    </div>
    <div class="cur">
      <span>🪙 <b id="tGold">0</b></span><span>💠 <b id="tStone">0</b></span><span>💎 <b id="tGem">0</b></span>
    </div>
    <div class="tbar"><i id="tExpFill"></i></div>
    <div class="enwrap"><span style="font-size:13px">⚡</span><div class="ebar"><i id="tEnFill"></i></div><span class="etx" id="tEnTxt">0/0</span></div>
  </div>

  <div class="content">
    <section id="p-hunt" class="pane">
      <div class="card">
        <div id="huntInfo"></div>
        <div class="scene"><canvas id="cv" width="440" height="180"></canvas></div>
        <div class="huntbtns" id="huntActions"></div>
      </div>
      <div id="huntExtra"></div>
    </section>
    <section id="p-gacha" class="pane"></section>
    <section id="p-equip" class="pane"></section>
    <section id="p-grow" class="pane"></section>
    <section id="p-rank" class="pane"></section>
  </div>

  <nav class="tabbar">
    <button class="tabbtn on" data-t="hunt"><span class="ic">🗡️</span>사냥</button>
    <button class="tabbtn" data-t="gacha"><span class="ic">🎁</span>뽑기</button>
    <button class="tabbtn" data-t="equip"><span class="ic">🛡️</span>장비</button>
    <button class="tabbtn" data-t="grow"><span class="ic">📖</span>육성</button>
    <button class="tabbtn" data-t="rank"><span class="ic">🏆</span>랭킹</button>
  </nav>
</div>

<div class="overlay" id="ov-reveal"></div>
<div class="overlay" id="ov-modal"></div>

   const e={handle:(r.nick||"익명").split("/")[0],name:r.nick||"익명",pow:pw,lv:r.lv,bestStage:r.best_stage,dex:r.dex_count,arena:r.arena_pts,rebirth:r.rebirth||0,op:r.is_op,me:false};

   return e;
 });
 if(!list.some(x=>x.me))list.push({...M,val:M[metric]});
 list.sort((a,b)=>b.val-a.val||b.pow-a.pow);return list;}

/* ---------- 파생 수치 ---------- */
function expNeed(){return Math.round(80*Math.pow(S.lv,1.35));}
function rebirthMul(){return 1+S.rebirth*0.25;}
function dexCount(){return Object.keys(S.dex).length;}
function dexTotal(){let t=0;for(const s in POOL)t+=POOL[s].length;return t;}
function dexBonusPct(){ // 도감 수집 + 수집가 스킬
 const base=dexCount()*1.2; const mul=1+S.skills.collect*0.25; return base*mul; }
function itemPow(it){return Math.round(it.power*(1+it.plus*0.13));}
function gearPow(){let p=0;for(const s in S.equip){const it=S.equip[s];if(it)p+=itemPow(it);}return p;}
function bestStageEff(){const raw=(S.bestRegion-1)*10+S.bestStage;return Math.min(raw,100+S.lv*14+S.rebirth*100);}
// 다른 사람의 전투력도 '그 사람의 구성요소'로 동일 공식 계산 → DB 계산식과 무관, 항상 일치
function nnum(v,d){const n=Number(v);return Number.isFinite(n)?n:(d||0);}
function calcPow(r){
 const sp=nnum(r.power,-1);
 if(sp>=0)return Math.floor(sp);                 // 서버가 계산한 power가 있으면 그 값을 신뢰(버전 차이에도 모두 동일)
 const lv=nnum(r.lv,1),reb=nnum(r.rebirth,0);    // 구버전/오프라인 fallback
 const bs=Math.min(nnum(r.best_stage,1),100+lv*14+reb*100);
 const atk=1+nnum(r.atk_lv,0)*0.06;
 const dex=1+(nnum(r.dex_count,0)*1.2*(1+nnum(r.collect_lv,0)*0.25))/100;
 return Math.floor((12+lv*6+bs*2+nnum(r.gear_power,0))*atk*dex*(1+reb*0.25));
}
function power(){
 const base=12+S.lv*6+bestStageEff()*2;   // 진행도(최고 스테이지)도 전투력에 반영
 const atk=1+S.skills.atk*0.06;
 const dex=1+dexBonusPct()/100;
 return Math.floor((base+gearPow())*atk*dex*rebirthMul());
}
function atkInterval(){return clamp(950-power()*0.6-S.skills.haste*40,260,950);}
function critChance(){return clamp(0.05+S.skills.luck*0.0,0,0.6);}

/* ---------- 행동력 ---------- */
function regen(){const now=Date.now();if(S.energy>=MAXE){S.lastEnergyAt=now;return;}
 const step=Math.round(REGEN_MS*(1-S.skills.haste*0.05));
 const g=Math.floor((now-S.lastEnergyAt)/step);if(g>0){S.energy=Math.min(MAXE,S.energy+g);S.lastEnergyAt+=g*step;}}
function spend(n){regen();if(S.energy>=MAXE)S.lastEnergyAt=Date.now();S.energy=Math.max(0,S.energy-n);}

/* ---------- 전리품 ---------- */
function rollRarity(){
 if(S.pity>=PITY)return 3; // 천장: 영웅 확정. 전설·신화는 천장으로도 안 나옴(극악 유지)
 const lk=S.skills.luck;
 const w=RAR.map((r,i)=>i===2?r.w*(1+lk*0.04):i===3?r.w*(1+lk*0.03):r.w); // 행운은 희귀/영웅만 소폭
 let t=w.reduce((a,b)=>a+b,0),x=Math.random()*t;
 for(let i=0;i<w.length;i++){if((x-=w[i])<=0)return i;}return 0;}
function rollSlot(){const ks=Object.keys(SLOTW);let t=0;ks.forEach(k=>t+=SLOTW[k]);let x=Math.random()*t;for(const k of ks){if((x-=SLOTW[k])<=0)return k;}return"weapon";}
function makeItem(slot){slot=slot||rollSlot();const type=pick(POOL[slot]);const r=rollRarity();
 const pw=Math.max(1,Math.round(PBASE[slot]*RAR[r].mul*(0.9+Math.random()*0.3)*(1+S.lv*0.07+S.region*0.25)));
 if(r>=3)S.pity=0;else S.pity++;
 return{id:Date.now().toString(36)+(Math.random()*1e6|0).toString(36),slot,type,rarity:r,power:pw,plus:0};}
function addDex(it){const k=it.slot+":"+it.type;S.dex[k]=Math.max(S.dex[k]==null?-1:S.dex[k],it.rarity);}
function gainItem(it,silent){
 addDex(it);
 if(S.autoSalvage>0 && it.rarity<=S.autoSalvage){doSalvage(it);return{salvaged:true,it};}
 S.inv.push(it);return{salvaged:false,it};}

function pull(){regen();if(S.energy<PULL1){toast("행동력이 부족해요");return null;}
 spend(PULL1);S.daily.pulls++;const it=makeItem();const r=gainItem(it);save();updateTop();
 return it;}
function pull10(){regen();if(S.energy<PULL10){if(S.gems>=20){S.gems-=20;}else{toast("행동력이 부족해요 (젬 20으로 대체 가능)");return null;}}
 else spend(PULL10);
 const out=[];let best=0;for(let i=0;i<10;i++){const it=makeItem();gainItem(it);out.push(it);if(it.rarity>best)best=it.rarity;}
 S.daily.pulls+=10;save();updateTop();return out;}

/* ---------- 장비 ---------- */
function equip(id){const i=S.inv.findIndex(x=>x.id===id);if(i<0)return;const it=S.inv[i];
 const cur=S.equip[it.slot];S.equip[it.slot]=it;S.inv.splice(i,1);if(cur)S.inv.unshift(cur);
 save();updateTop();renderTab();toast(NAMES[it.type]+" 장착!");}
function enhCost(it){return{gold:Math.round(40*Math.pow(1.5,it.plus)*(it.rarity+1)),stone:Math.round(2+it.plus*1.5+it.rarity)};}
function enhance(id,fromEquip){
 const it=fromEquip?S.equip[id]:S.inv.find(x=>x.id===id);if(!it)return;
 if(it.plus>=ENH_MAX){toast("이미 최대 강화");return;}
 const c=enhCost(it);if(S.gold<c.gold||S.stones<c.stone){toast("재화가 부족해요 (골드/강화석)");return;}
 S.gold-=c.gold;S.stones-=c.stone;it.plus++;S.daily.enh++;
 save();updateTop();renderTab();toast(NAMES[it.type]+" +"+it.plus+" 강화 성공!");}
function salvageValue(it){return Math.round((it.rarity+1)*(2+it.plus)*1.5*(1+S.skills.wealth*0.08));}
function doSalvage(it){S.stones+=salvageValue(it);}
function salvage(id){const i=S.inv.findIndex(x=>x.id===id);if(i<0)return;const it=S.inv[i];doSalvage(it);S.inv.splice(i,1);save();updateTop();renderTab();}
function salvageAll(maxR){let n=0,g=0;S.inv=S.inv.filter(it=>{if(it.rarity<=maxR){g+=salvageValue(it);n++;return false;}return true;});S.stones+=g;
 if(n)toast(n+"개 분해 · 강화석 +"+g);else toast("분해할 장비 없음");save();updateTop();renderTab();}

function learn(id){const lv=S.skills[id];const c=skillCost(lv);
 if(S.skillPts<c.pt){toast("스킬 포인트가 부족해요");return;}

function ymd(d){return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();}
function yesterday(){const d=new Date();d.setDate(d.getDate()-1);return ymd(d);}

const ATTEND_RW=[{gold:400},{stones:25},{gems:10},{gold:1200},{stones:50},{gems:15},{gems:50}];
function rollAttend(){if(!S.attend)S.attend={last:"",streak:0,claimed:false};const t=today();
 if(S.attend.last!==t){S.attend.streak=(S.attend.last===yesterday())?(S.attend.streak+1):1;S.attend.last=t;S.attend.claimed=false;}}

 const r=ATTEND_RW[attendIdx()];applyReward(r);S.attend.claimed=true;save();updateTop();renderTab();
 toast(S.attend.streak+"일 연속 출석 보상 획득!");}

function seedRand(seed){let s=seed%2147483647;if(s<=0)s+=2147483646;return()=>(s=s*16807%2147483647)/2147483647;}
let _bots=null;
function bots(){
 if(_bots)return _bots;
 const epoch=new Date(2026,5,1).getTime();
 const days=Math.max(0,(Date.now()-epoch)/86400000);
 _bots=[];
 for(let i=0;i<44;i++){
   const r=seedRand(i*733+13);
   const op=i<3;
   const handle=op?OPS[i]:HANDLES[i-3];
   const reg=REGIONS[Math.floor(r()*REGIONS.length)];
   const sex=r()<0.5?"남":"여";
   const yr=String(82+Math.floor(r()*18)).padStart(2,"0");
   const tier=op?1:Math.pow(r(),1.6); // 0~1, 낮을수록 강함(상위)
   let basePow=Math.round(40+Math.pow(1-tier,3)*5200 + (op?2500:0));
   basePow=Math.round(basePow*(1+days*0.012*(0.7+r()*0.6)));
   const lv=clamp(Math.round(3+Math.pow(basePow,0.42)),1,250);
   const bestStage=clamp(Math.round(basePow/180)+1,1,400);
   const dex=clamp(Math.round((1-tier)*dexTotal()*(0.6+r()*0.5)),0,dexTotal());
   const arena=Math.round(900+(1-tier)*2200+r()*200);
   const reb=op?0:clamp(Math.floor((1-tier)*5*(0.5+r()*0.7)),0,6);
   _bots.push({op,name:handle+"/"+reg+"/"+sex+"/"+yr,handle,pow:basePow,lv,bestStage,dex,arena,rebirth:reb});
 }
 return _bots;
}
function me(){const nk=(typeof NET!=="undefined"&&NET.nick)?NET.nick:null;return{me:true,name:nk||"나",handle:nk?nk.split("/")[0]:"나",pow:power(),lv:S.lv,bestStage:(S.bestRegion-1)*10+S.bestStage,dex:dexCount(),arena:S.arenaPts,rebirth:S.rebirth,op:false};}
function board(metric){
 if(NET.ready&&NET.roster&&NET.roster.length)return liveBoard(metric);
 const list=bots().map(b=>({...b,val:b[metric]})).concat([{...me(),val:me()[metric]}]).filter(e=>e.me||!e.op);
 list.sort((a,b)=>b.val-a.val||b.pow-a.pow);
 return list;}
function myRank(metric){const l=board(metric);return l.findIndex(x=>x.me)+1;}

function arenaOpponents(){
 const l=board("arena");const i=l.findIndex(x=>x.me);
 const out=[];for(let d=-2;d<=2;d++){const j=i+d;if(j>=0&&j<l.length&&!l[j].me)out.push(l[j]);}
 return out.slice(0,4);}
function arenaCdLeft(){const ms=(S.arenaCdUntil||0)-Date.now();if(ms<=0)return"";const h=Math.floor(ms/3600000),m=Math.floor(ms%3600000/60000);return(h>0?h+"시간 ":"")+m+"분";}
function arenaFight(opp){

 if((S.arenaCdUntil||0)>now){toast("아레나 재충전 중 · "+arenaCdLeft()+" 남음");return null;}

 pops.forEach(p=>p.t+=dt);pops=pops.filter(p=>p.t<820);

 s+='<div class="myrank"><div>내 순위 <b>#'+myr+'</b> / '+list.length+(S.rebirth>0?' · <span style="color:#ffd96b">✦'+S.rebirth+'환생</span>':'')+'</div><div class="mv">'+valLab(me0.val)+'</div></div>';
 if(myr>1){const up=list[myr-2];const diff=up.val-me0.val;

 s+='</div>';
 // 리스트
 s+='<div class="rlist">';
 list.slice(0,30).forEach((e,i)=>{

 s+='</div>';
 if(myr>30){s+='<div class="rrow meRow'+(me0.rebirth>0?' hasReb':'')+'"><div class="rno">'+myr+'</div><div class="rnm">'+me0.handle+' (나)'+rebTag(me0.rebirth)+'<span class="rmeta"> Lv.'+me0.lv+'</span></div><div class="rval">'+valLab(me0.val)+'</div></div>';}
 s+='<p class="muted small" style="text-align:center;margin-top:8px">👑 운영진은 경쟁 집계에서 제외돼요</p>';
 s+='</div>';
 // 아레나
 const ops=arenaOpponents();const onCd=(S.arenaCdUntil||0)>Date.now();
 s+='<div class="card"><div class="ttl2">아레나 <span class="muted">'+S.arenaPts+'점 · '+myRank("arena")+'위</span></div>'+

function reveal(items){
 const ov=$("#ov-reveal");if(!ov)return;
 if(items.length===1){const it=items[0];const c=RAR[it.rarity].c;
  ov.innerHTML='<div class="rcard" style="--c:'+c+'"><div class="rburst"></div><div class="ribox">'+ICO[it.slot]+'</div>'+
   '<div class="rr">'+RAR[it.rarity].k+'</div><div class="rn">'+NAMES[it.type]+'</div><div class="rs">'+SLOTNAME[it.slot]+'</div>'+
   '<div class="rp">전투력 +'+itemPow(it)+'</div><div class="racts"><button class="rq" id="rEq">장착</button><button class="rc" id="rC">보관</button></div></div>';
  ov.classList.add("show");fxRarity(it.rarity,ov);
  const eq=$("#rEq");if(eq)eq.onclick=()=>{equip(it.id);ov.classList.remove("show");};
  const cc=$("#rC");if(cc)cc.onclick=()=>{ov.classList.remove("show");renderTab();};
 }else{
  let best=0;items.forEach(it=>{if(it.rarity>best)best=it.rarity;});
  let grid=items.map(it=>{const c=RAR[it.rarity].c;return '<div class="mcell" style="--c:'+c+'">'+ICO[it.slot]+'<div class="mn">'+NAMES[it.type]+'</div><div class="mr" style="color:'+c+'">'+RAR[it.rarity].k+'</div></div>';}).join("");
  ov.innerHTML='<div class="tcard"><div class="tt">10연 결과</div><div class="mgrid">'+grid+'</div><button class="rq" id="tC">확인</button></div>';
  ov.classList.add("show");fxRarity(best,ov);
  const tc=$("#tC");if(tc)tc.onclick=()=>{ov.classList.remove("show");renderTab();};
 }
}
function fxRarity(r,ov){
 if(r>=4){const f=$("#flash");if(f){f.classList.remove("go");void f.offsetWidth;f.classList.add("go");}}
 if(r>=3){const card=ov.querySelector(".rcard")||ov.querySelector(".tcard");if(!card)return;const n=r>=4?18:10;
  for(let i=0;i<n;i++){const a=Math.random()*6.28,d=80+Math.random()*100;const p=document.createElement("div");p.className="rpar";
   p.style.cssText="--tx:"+Math.cos(a)*d+"px;--ty:"+Math.sin(a)*d+"px;animation-delay:"+(Math.random()*.1)+"s";card.appendChild(p);}}
}

function idleReward(){const away=Date.now()-(S.lastSeen||Date.now());if(away<60000)return;
 const eff=Math.min(away,idleCapH()*3600000);const per=Math.max(600,2400-power()*1.2);const k=Math.floor(eff/per);if(k<=0)return;
 const wm=wealthMul();const rb=1+S.rebirth*0.1;
 const gold=Math.round(k*(5+S.region*4)*wm),exp=Math.round(k*(4+S.region*2)*rb),stone=Math.round(k*0.4*wm);
 S.gold+=gold;S.exp+=exp;S.stones+=stone;S.kills+=k;checkLevel();
 const ov=$("#ov-modal");if(!ov)return;
 ov.innerHTML='<div class="mcard wc"><div class="tt">🧟 사냥 보고</div><p class="muted">자리를 비운 동안 생존자가 자동으로 사냥했어요</p>'+
  '<div class="wrow"><div>처치<b>'+fmt(k)+'</b></div><div>골드<b>'+fmt(gold)+'</b></div><div>경험치<b>'+fmt(exp)+'</b></div><div>강화석<b>'+fmt(stone)+'</b></div></div>'+
  '<button class="rq" id="wOk">받기</button></div>';ov.classList.add("show");
