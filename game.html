<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>좀비 헌팅 · 논현 모임</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
body{font-family:"Pretendard Variable",Pretendard,system-ui,sans-serif;min-height:100vh;color:#ece4f5;
 background:radial-gradient(130% 80% at 50% -10%,#341a52 0%,#211036 46%,#150a22 82%,#0d0518 100%);
 display:grid;place-items:start center;padding:14px 0 30px}
.game{width:100%;max-width:460px;padding:0 14px}
.title{display:flex;align-items:center;gap:9px;margin:4px 2px 12px}
.title .m{width:30px;height:30px;border-radius:9px;background:linear-gradient(140deg,#8a35c0,#4A1568);display:grid;place-items:center;font-weight:800;font-size:14px;color:#fff;box-shadow:0 6px 18px rgba(103,32,145,.4)}
.title b{font-size:16px;font-weight:800;letter-spacing:-0.02em}
.title .dem{margin-left:auto;font-size:9.5px;font-weight:800;color:#f0d472;background:rgba(201,162,39,.16);padding:4px 9px;border-radius:999px;letter-spacing:.05em}
/* HUD */
.hud{background:rgba(255,255,255,.04);border:1px solid rgba(160,95,208,.2);border-radius:16px;padding:12px;margin-bottom:12px}
.hud .row1{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.lvbadge{font-size:13px;font-weight:800;color:#fff;background:linear-gradient(135deg,#8a35c0,#5a1f86);padding:5px 11px;border-radius:9px;box-shadow:0 4px 12px rgba(138,53,192,.4)}
.pow{font-size:13px;font-weight:700;color:#e9c96b;margin-left:auto}
.gold{font-size:13px;font-weight:700;color:#ffd96b}
.bar{position:relative;height:14px;border-radius:8px;background:rgba(0,0,0,.34);overflow:hidden;margin-top:7px;border:1px solid rgba(255,255,255,.06)}
.bar i{display:block;height:100%;border-radius:8px;transition:width .4s cubic-bezier(.16,1,.3,1)}
.bar.exp i{background:linear-gradient(90deg,#a05fd0,#d6a6f0)}
.bar.en i{background:linear-gradient(90deg,#46c46e,#7fe0a0)}
.bar span{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:9.5px;font-weight:800;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.5);letter-spacing:.02em}
.blab{font-size:10px;font-weight:800;color:#b9a8cf;margin:8px 0 0 2px;display:flex;justify-content:space-between}
/* scene */
.scene{position:relative;border-radius:16px;overflow:hidden;margin-bottom:12px;border:1px solid rgba(160,95,208,.22);box-shadow:0 12px 40px rgba(0,0,0,.4)}
.scene canvas{display:block;width:100%;image-rendering:pixelated;image-rendering:crisp-edges}
.wavetag{position:absolute;left:10px;top:9px;font-size:11px;font-weight:800;color:#f0d472;background:rgba(0,0,0,.4);padding:4px 10px;border-radius:999px;letter-spacing:.04em}
.killtag{position:absolute;right:10px;top:9px;font-size:11px;font-weight:700;color:#cbb8e0;background:rgba(0,0,0,.35);padding:4px 10px;border-radius:999px}
/* pull */
.pull{width:100%;border:none;cursor:pointer;font-family:inherit;font-weight:800;font-size:16px;color:#fff;padding:15px;border-radius:15px;
 background:linear-gradient(135deg,#8a35c0,#5a1f86);box-shadow:0 10px 30px rgba(138,53,192,.45);margin-bottom:14px;transition:transform .15s,box-shadow .2s;position:relative;overflow:hidden}
.pull:active{transform:scale(.98)}
.pull:disabled{background:#46395c;box-shadow:none;color:#8d7caa;cursor:not-allowed}
.pull .ec{font-size:12px;font-weight:700;opacity:.85;margin-left:7px}
/* tabs */
.tabs{display:flex;gap:7px;margin-bottom:12px}
.tab{flex:1;border:none;font-family:inherit;font-weight:800;font-size:13.5px;padding:11px;border-radius:12px;cursor:pointer;
 background:rgba(255,255,255,.05);color:#a394bd;transition:all .2s}
.tab.on{background:linear-gradient(135deg,#8a35c0,#5a1f86);color:#fff}
/* portrait + slots */
.equiptop{display:flex;gap:12px;margin-bottom:14px}
.portrait{flex:none;width:118px;background:rgba(255,255,255,.04);border:1px solid rgba(160,95,208,.2);border-radius:14px;display:grid;place-items:center;padding:6px}
.portrait canvas{image-rendering:pixelated;width:104px}
.slots{flex:1;display:flex;flex-direction:column;gap:7px}
.slot{display:flex;align-items:center;gap:9px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:11px;padding:8px 10px}
.slot .si{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;flex:none;background:rgba(160,95,208,.16);color:#d3b8f0}
.slot .si svg{width:17px;height:17px}
.slot .sn{font-size:13px;font-weight:700;line-height:1.2}
.slot .ss{font-size:10.5px;font-weight:700;margin-top:1px}
.slot .sp{margin-left:auto;font-size:12px;font-weight:800;color:#e9c96b}
.empty-s{color:#7d6e9a;font-size:12px;font-weight:600}
/* inventory */
.invhdr{font-size:11px;font-weight:800;color:#b9a8cf;letter-spacing:.06em;margin:4px 2px 9px;display:flex;justify-content:space-between}
.invgrid{display:flex;flex-direction:column;gap:8px}
.item{display:flex;align-items:center;gap:11px;background:rgba(255,255,255,.04);border:1.5px solid var(--c,#555);border-radius:12px;padding:10px 12px}
.item .ii{width:38px;height:38px;border-radius:9px;display:grid;place-items:center;flex:none;background:rgba(0,0,0,.25);color:var(--c)}
.item .ii svg{width:21px;height:21px}
.item .inm{font-size:13.5px;font-weight:700}
.item .irar{font-size:11px;font-weight:800;color:var(--c)}
.item .ipw{font-size:11px;color:#a394bd;margin-left:6px}
.item .eq{margin-left:auto;border:none;font-family:inherit;font-weight:800;font-size:12px;color:#fff;background:rgba(160,95,208,.3);
 border:1px solid rgba(160,95,208,.5);padding:8px 12px;border-radius:9px;cursor:pointer}
.item .eq:active{transform:scale(.96)}
.item.equipped .eq{background:rgba(70,196,110,.18);border-color:rgba(70,196,110,.5);color:#8fe0a8}
.emptybox{text-align:center;color:#7d6e9a;font-size:13px;padding:30px 16px;line-height:1.7}
/* dex */
.dexgrp{margin-bottom:16px}
.dexglab{font-size:11px;font-weight:800;color:#b9a8cf;letter-spacing:.05em;margin-bottom:9px}
.dexgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.dcell{aspect-ratio:1;border-radius:11px;border:1.5px solid var(--c,#39314a);background:rgba(255,255,255,.03);
 display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:5px;text-align:center}
.dcell.locked{opacity:.4}
.dcell svg{width:20px;height:20px;color:var(--c,#6b6477)}
.dcell .dn{font-size:9.5px;font-weight:700;color:#cbb8e0;line-height:1.1}
/* overlay reveal */
.overlay{position:fixed;inset:0;background:rgba(8,4,16,.78);backdrop-filter:blur(4px);display:none;place-items:center;z-index:60;padding:20px}
.overlay.show{display:grid;animation:ovin .3s ease}
@keyframes ovin{from{opacity:0}to{opacity:1}}
.rcard{width:230px;border-radius:24px;padding:28px 22px 22px;text-align:center;position:relative;
 background:rgba(255,255,255,.05);border:2px solid var(--c,#9aa0aa);box-shadow:0 0 50px -6px var(--c),0 20px 60px rgba(0,0,0,.6);animation:rpop .5s cubic-bezier(.16,1,.3,1)}
@keyframes rpop{0%{opacity:0;transform:scale(.55) rotateY(40deg)}100%{opacity:1;transform:none}}
.rcard .ribox{width:96px;height:96px;margin:0 auto 14px;border-radius:18px;display:grid;place-items:center;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.08);color:var(--c)}
.rcard .ribox svg{width:56px;height:56px}
.rcard .rr{font-size:12px;font-weight:800;letter-spacing:.12em;color:var(--c);text-transform:uppercase}
.rcard .rn{font-size:18px;font-weight:800;color:#fff;margin:5px 0 2px}
.rcard .rs{font-size:12px;color:#a394bd}
.rcard .rp{font-size:13px;font-weight:800;color:#e9c96b;margin-top:8px}
.rcard .racts{display:flex;gap:8px;margin-top:18px}
.rcard .racts button{flex:1;border:none;font-family:inherit;font-weight:800;font-size:14px;padding:12px;border-radius:12px;cursor:pointer}
.rcard .rq{background:linear-gradient(135deg,#8a35c0,#5a1f86);color:#fff}
.rcard .rc{background:rgba(255,255,255,.08);color:#cbb8e0}
.rburst{position:absolute;left:50%;top:42%;width:30px;height:30px;border-radius:50%;border:2px solid var(--c);transform:translate(-50%,-50%);animation:rb .7s ease forwards;pointer-events:none}
@keyframes rb{to{width:320px;height:320px;opacity:0;border-width:1px}}
.rpar{position:absolute;left:50%;top:42%;width:7px;height:7px;border-radius:50%;background:var(--c);pointer-events:none;
 animation:rp .9s ease forwards}
@keyframes rp{0%{opacity:1;transform:translate(-50%,-50%)}100%{opacity:0;transform:translate(calc(-50% + var(--tx)),calc(-50% + var(--ty)))}}
.flash{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:65}
.flash.go{animation:fl .55s ease forwards}
@keyframes fl{0%{opacity:0}14%{opacity:.8}100%{opacity:0}}
/* welcome */
.wcard{width:260px;border-radius:22px;padding:26px 22px;text-align:center;background:#1d1030;border:1px solid rgba(160,95,208,.3);box-shadow:0 20px 60px rgba(0,0,0,.6)}
.wcard h3{font-size:18px;font-weight:800;margin-bottom:6px}
.wcard p{font-size:13.5px;color:#bca9d6;line-height:1.7;margin-bottom:6px}
.wcard .wrow{display:flex;justify-content:space-around;margin:14px 0;font-size:13px}
.wcard .wrow b{display:block;font-size:18px;color:#e9c96b;font-weight:800}
.wcard button{width:100%;border:none;font-family:inherit;font-weight:800;font-size:15px;padding:13px;border-radius:13px;background:linear-gradient(135deg,#8a35c0,#5a1f86);color:#fff;cursor:pointer}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(26,20,35,.95);color:#fff;
 font-size:13px;font-weight:600;padding:11px 20px;border-radius:999px;opacity:0;pointer-events:none;transition:.35s cubic-bezier(.16,1,.3,1);z-index:70;box-shadow:0 10px 30px rgba(0,0,0,.5)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.note{font-size:11px;color:#6f6090;text-align:center;margin-top:14px;line-height:1.6}
</style></head>
<body>
<div class="game">
  <a href="index.html" style="display:inline-flex;align-items:center;gap:6px;margin:2px 2px 12px;padding:7px 13px;border-radius:999px;background:rgba(160,95,208,.16);border:1px solid rgba(160,95,208,.28);color:#d6a6f0;font-weight:800;font-size:12.5px;text-decoration:none">← 메인으로</a>
  <div class="title"><div class="m">論</div><b>좀비 헌팅</b><span class="dem">미니게임</span></div>

  <div class="hud">
    <div class="row1">
      <span class="lvbadge">Lv.<span id="lv">1</span></span>
      <span class="gold">🪙 <b id="gold">0</b></span>
      <span class="pow">⚔️ 전투력 <b id="pow">0</b></span>
    </div>
    <div class="blab"><span>경험치</span><span id="exptxt2"></span></div>
    <div class="bar exp"><i id="expfill"></i></div>
    <div class="blab"><span>행동력</span><span id="entxt2"></span></div>
    <div class="bar en"><i id="enfill"></i></div>
  </div>

  <div class="scene">
    <canvas id="cv" width="440" height="180"></canvas>
    <div class="wavetag">WAVE <span id="wave">1</span></div>
    <div class="killtag">처치 <span id="kills">0</span></div>
  </div>

  <button class="pull" id="pullBtn">⚔️ 전리품 뽑기 <span class="ec">행동력 3</span></button>

  <div class="tabs">
    <button class="tab on" data-t="equip">장비</button>
    <button class="tab" data-t="dex">도감</button>
  </div>
  <div id="tab-equip" class="tabpane"></div>
  <div id="tab-dex" class="tabpane" style="display:none"></div>

  <div class="note">방치 중에도 자동으로 사냥이 진행됩니다 · 자주 들어와 전리품을 뽑을수록 더 빨리 강해집니다</div>
</div>

<div class="overlay" id="reveal"></div>
<div class="overlay" id="welcome"></div>
<div class="flash" id="flash"></div>
<div class="toast" id="toast"></div>

const MAXE=20,PULLCOST=3,REGEN_MS=90000,KEY="nh_zombie_v1";
const $=s=>document.querySelector(s);

/* ============ save ============ */
let S=load();
function load(){try{const s=JSON.parse(localStorage.getItem(KEY));if(s&&s.equip)return s;}catch(e){}
 return {lv:1,exp:0,gold:0,energy:MAXE,lastEnergyAt:Date.now(),lastSeen:Date.now(),wave:1,kills:0,keCtr:0,
  equip:{weapon:null,top:null,head:null,legs:null,cape:null},dex:{},inv:[]};}
function save(){S.lastSeen=Date.now();try{localStorage.setItem(KEY,JSON.stringify(S));}catch(e){}}

function expNeed(){return S.lv*120;}
function power(){let p=8+S.lv*4;for(const sl in S.equip){const it=S.equip[sl];if(it)p+=it.power;}return Math.round(p);}
function checkLevel(){let up=false;while(S.exp>=expNeed()){S.exp-=expNeed();S.lv++;up=true;}return up;}

/* ============ energy ============ */
function regen(){const now=Date.now();if(S.energy>=MAXE){S.lastEnergyAt=now;return;}
 const g=Math.floor((now-S.lastEnergyAt)/REGEN_MS);if(g>0){S.energy=Math.min(MAXE,S.energy+g);S.lastEnergyAt+=g*REGEN_MS;}}
function spendEnergy(n){regen();if(S.energy>=MAXE)S.lastEnergyAt=Date.now();S.energy-=n;}

/* ============ loot ============ */
function rollRarity(){let t=0;RAR.forEach(r=>t+=r.w);let x=Math.random()*t;for(let i=0;i<RAR.length;i++){if((x-=RAR[i].w)<=0)return i;}return 0;}
function rollSlot(){const ks=Object.keys(SLOTW);let t=0;ks.forEach(k=>t+=SLOTW[k]);let x=Math.random()*t;for(const k of ks){if((x-=SLOTW[k])<=0)return k;}return"weapon";}
function makeItem(slot){slot=slot||rollSlot();const type=POOL[slot][Math.random()*POOL[slot].length|0];const r=rollRarity();
 const pw=Math.max(1,Math.round(PBASE[slot]*RMUL[r]*(0.9+Math.random()*0.25)*(1+S.lv*0.05)));
 return {id:Date.now().toString(36)+(Math.random()*1e5|0),slot,type,rarity:r,power:pw};}
function addToDex(it){const k=it.slot+":"+it.type;S.dex[k]=Math.max(S.dex[k]==null?-1:S.dex[k],it.rarity);}

function pull(){regen();if(S.energy<PULLCOST){toast("행동력이 부족해요 (시간이 지나면 회복)");return;}
 spendEnergy(PULLCOST);const it=makeItem();S.inv.push(it);addToDex(it);save();updateHUD();reveal(it);}

function equip(id){const i=S.inv.findIndex(x=>x.id===id);if(i<0)return;const it=S.inv[i];
 const cur=S.equip[it.slot];S.equip[it.slot]=it;S.inv.splice(i,1);if(cur)S.inv.unshift(cur);
 save();updateHUD();renderEquip();toast(NAMES[it.type]+" 장착!");}

const IMG={};let loaded=0;const allk=[...Object.keys(PSRC),...Object.keys(ZSRC)];
allk.forEach(k=>{const im=new Image();im.onload=()=>{if(++loaded===allk.length)boot();};im.src=PSRC[k]||ZSRC[k];IMG[k]=im;});

function playerOrder(){const e=S.equip,o=[];
 if(e.cape)o.push("cape_"+e.cape.type+"_bg");
 if(e.weapon)o.push(e.weapon.type+"_bg");
 o.push("body","head",e.legs?e.legs.type:"pants","boots",e.top?e.top.type:"shirt");
 if(e.cape)o.push("cape_"+e.cape.type+"_fg");
 o.push(e.head?e.head.type:"hair");
 if(e.weapon)o.push(e.weapon.type+"_fg");
 return o;}
function drawLayer(k,sx,sy,dx,dy,sc){const im=IMG[k];if(im&&im.complete)ctx.drawImage(im,sx*64,sy,64,64,dx,dy,64*sc,64*sc);}
function spawnZombie(){const boss=(S.kills>0&&S.kills%18===0&&!zombies.some(z=>z.boss));
 const skel=Math.random()<0.35;
 const hp=Math.round((22+S.wave*15)*(boss?5:1));
 zombies.push({x:W+20+Math.random()*40,boss,skel,hp,maxhp:hp,sc:(boss?ZSCALE*1.5:ZSCALE),f:0,ft:0,flash:0,dead:false});}
function update(dt){
 regen();
 spawnT-=dt;const maxZ=boss()?6:5;
 if(spawnT<=0&&zombies.length<maxZ){spawnZombie();spawnT=Math.max(550,1700-S.wave*28);}
 // queue positions
 zombies.sort((a,b)=>a.x-b.x);
 zombies.forEach((z,i)=>{
   const tx=playerX+58+i*26;
   if(z.x>tx){z.x-=(20+S.wave*0.6)*dt/1000;if(z.x<tx)z.x=tx;z.ft+=dt;if(z.ft>110){z.ft=0;z.f=(z.f+1)%9||1;if(z.f===0)z.f=1;}}
   if(z.flash>0)z.flash-=dt;
 });
 // attack
 atkCd-=dt;
 const tgt=zombies.find(z=>!z.dead&&z.x<=playerX+72);
 if(tgt&&atkCd<=0){
   const dmg=Math.max(3,Math.round(power()*0.75));
   tgt.hp-=dmg;tgt.flash=120;slashFx=140;lunge=120;
   pops.push({x:tgt.x,y:BASE-70,txt:dmg,t:0,c:"#fff"});
   atkCd=Math.max(300,1000-power()*3.2);
   if(tgt.hp<=0)kill(tgt);
 }
 if(slashFx>0)slashFx-=dt; if(lunge>0)lunge-=dt;
 pops.forEach(p=>p.t+=dt);pops=pops.filter(p=>p.t<800);
 // idle player walk anim
 pt+=dt;if(pt>150){pt=0;pf=(pf+1)%8;}
}
function kill(z){z.dead=true;zombies=zombies.filter(x=>x!==z);
 const m=z.boss?6:1;
 const gold=Math.round((4+S.wave*2)*(0.85+Math.random()*0.3))*m;
 const exp=Math.round((3+S.wave*1.2)*(0.85+Math.random()*0.3))*m;
 S.gold+=gold;S.exp+=exp;S.kills++;S.keCtr=(S.keCtr||0)+1;
 pops.push({x:z.x,y:BASE-92,txt:"+"+gold+"G",t:0,c:"#ffd96b"});
 if(S.keCtr>=6){S.keCtr=0;regen();if(S.energy<MAXE){if(S.energy>=MAXE-1)S.lastEnergyAt=Date.now();S.energy=Math.min(MAXE,S.energy+1);}}
 if(S.kills%10===0)S.wave++;
 const drop=z.boss?0.7:0.12;
 if(Math.random()<drop){const it=makeItem();S.inv.push(it);addToDex(it);toast("전리품 획득 · "+RAR[it.rarity].k+" "+NAMES[it.type]);if(curTab==="equip")renderEquip();}
 if(checkLevel())toast("레벨 업! Lv."+S.lv);
 updateHUD();save();
}
function boss(){return zombies.some(z=>z.boss);}
function drawScene(){
 ctx.clearRect(0,0,W,H);
 // ground
 const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,"rgba(60,30,90,0)");g.addColorStop(1,"rgba(20,10,34,.9)");
 ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
 ctx.strokeStyle="rgba(160,95,208,.18)";ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,BASE+2);ctx.lineTo(W,BASE+2);ctx.stroke();
 // zombies (far to near = right to left already sorted asc x; draw far first => larger x first)
 [...zombies].sort((a,b)=>b.x-a.x).forEach(z=>{
   const order=z.skel?["skel"]:["zbody","zshirt","zhead"];
   const dx=z.x-32*z.sc, dy=BASE-64*z.sc;
   if(z.flash>0){ctx.save();ctx.globalAlpha=1;}
   order.forEach(k=>drawLayer(k,z.f,0,dx,dy,z.sc));
   if(z.flash>0){ctx.fillStyle="rgba(255,80,80,"+(z.flash/300)+")";ctx.fillRect(dx+10,dy+6,44*z.sc/2.2,60*z.sc/2.2);ctx.restore();}
   // hp bar
   if(z.hp<z.maxhp){const bw=30*z.sc/2.2;ctx.fillStyle="rgba(0,0,0,.5)";ctx.fillRect(z.x-bw/2,dy-6,bw,4);
     ctx.fillStyle=z.boss?"#e6c964":"#ff5d6c";ctx.fillRect(z.x-bw/2,dy-6,bw*Math.max(0,z.hp/z.maxhp),4);}
 });
 // player
 const lx=playerX+(lunge>0?10:0);
 const po=playerOrder();const dx=lx-32*PSCALE,dy=BASE-64*PSCALE;
 po.forEach(k=>drawLayer(k,1+(pf%8),64,dx,dy,PSCALE)); // sy=64 right-facing
 // slash fx
 if(slashFx>0){ctx.save();ctx.globalAlpha=slashFx/140;ctx.strokeStyle="#fff";ctx.lineWidth=3;
   ctx.beginPath();ctx.arc(lx+40,BASE-58,30,-0.9,0.9);ctx.stroke();
   ctx.strokeStyle="rgba(214,166,240,.8)";ctx.lineWidth=6;ctx.beginPath();ctx.arc(lx+40,BASE-58,30,-0.6,0.6);ctx.stroke();ctx.restore();}
 // pops
 pops.forEach(p=>{const a=1-p.t/800;ctx.save();ctx.globalAlpha=a;ctx.fillStyle=p.c;ctx.font="bold 15px Pretendard, sans-serif";
   ctx.textAlign="center";ctx.fillText(p.txt,p.x,p.y-p.t/16);ctx.restore();});
}
let last=0;
function loop(t){const dt=Math.min(50,t-last||16);last=t;update(dt);drawScene();requestAnimationFrame(loop);}

/* ============ HUD ============ */
function updateHUD(){
 $("#lv").textContent=S.lv;$("#gold").textContent=S.gold.toLocaleString();$("#pow").textContent=power();
 $("#wave").textContent=S.wave;$("#kills").textContent=S.kills.toLocaleString();
 const en=expNeed();$("#expfill").style.width=Math.min(100,S.exp/en*100)+"%";$("#exptxt2").textContent=S.exp+" / "+en;
 regen();$("#enfill").style.width=(S.energy/MAXE*100)+"%";
 let etx=S.energy+" / "+MAXE;
 if(S.energy<MAXE){const left=Math.ceil((REGEN_MS-(Date.now()-S.lastEnergyAt))/1000);etx+="  (+1 "+left+"s)";}
 $("#entxt2").textContent=etx;
 $("#pullBtn").disabled=S.energy<PULLCOST;
}

/* ============ reveal ============ */
function reveal(it){
 const c=RAR[it.rarity].c;const ov=$("#reveal");
 ov.innerHTML='<div class="rcard" style="--c:'+c+'"><div class="rburst"></div>'+
   '<div class="ribox">'+ICO[it.slot]+'</div>'+
   '<div class="rr">'+RAR[it.rarity].k+'</div><div class="rn">'+NAMES[it.type]+'</div>'+
   '<div class="rs">'+SLOTNAME[it.slot]+'</div><div class="rp">전투력 +'+it.power+'</div>'+
   '<div class="racts"><button class="rq" id="rEq">장착하기</button><button class="rc" id="rC">보관</button></div></div>';
 ov.classList.add("show");
 if(it.rarity>=4){const f=$("#flash");f.classList.remove("go");void f.offsetWidth;f.classList.add("go");}
 if(it.rarity>=3){const card=ov.querySelector(".rcard");const n=it.rarity>=4?18:10;
   for(let i=0;i<n;i++){const a=Math.random()*6.28,d=80+Math.random()*100;const p=document.createElement("div");p.className="rpar";
     p.style.cssText="--tx:"+Math.cos(a)*d+"px;--ty:"+Math.sin(a)*d+"px;animation-delay:"+(Math.random()*.1)+"s";card.appendChild(p);}}
 $("#rEq").onclick=()=>{equip(it.id);ov.classList.remove("show");};
 $("#rC").onclick=()=>{ov.classList.remove("show");if(curTab==="equip")renderEquip();};
}

/* ============ panels ============ */
let curTab="equip";
document.querySelectorAll(".tab").forEach(b=>b.onclick=()=>{
 curTab=b.dataset.t;document.querySelectorAll(".tab").forEach(x=>x.classList.toggle("on",x===b));
 $("#tab-equip").style.display=curTab==="equip"?"":"none";
 $("#tab-dex").style.display=curTab==="dex"?"":"none";
 if(curTab==="equip")renderEquip();else renderDex();
});
let portraitCv,portraitCtx,pPf=0;
function renderEquip(){
 const slots=["weapon","top","head","legs","cape"];
 let sl='<div class="equiptop"><div class="portrait"><canvas id="pcv" width="64" height="64"></canvas></div><div class="slots">';
 slots.forEach(s=>{const it=S.equip[s];const c=it?RAR[it.rarity].c:"#555";
   sl+='<div class="slot"><div class="si">'+ICO[s]+'</div><div><div class="sn">'+(it?NAMES[it.type]:'<span class="empty-s">'+SLOTNAME[s]+' 없음</span>')+'</div>'+
   (it?'<div class="ss" style="color:'+c+'">'+RAR[it.rarity].k+'</div>':'')+'</div>'+(it?'<div class="sp">+'+it.power+'</div>':'')+'</div>';});
 sl+='</div></div>';
 sl+='<div class="invhdr"><span>보관함</span><span>'+S.inv.length+'개</span></div>';
 if(!S.inv.length)sl+='<div class="emptybox">전리품 뽑기로 장비를 모아보세요.<br>좀비를 잡아도 가끔 떨어집니다.</div>';
 else{sl+='<div class="invgrid">';
   S.inv.slice().sort((a,b)=>b.rarity-a.rarity||b.power-a.power).forEach(it=>{const c=RAR[it.rarity].c;
     sl+='<div class="item" style="--c:'+c+'"><div class="ii">'+ICO[it.slot]+'</div><div><div class="inm">'+NAMES[it.type]+
     '<span class="ipw">전투력 +'+it.power+'</span></div><div class="irar">'+RAR[it.rarity].k+' · '+SLOTNAME[it.slot]+'</div></div>'+
     '<button class="eq" data-id="'+it.id+'">장착</button></div>';});
   sl+='</div>';}
 $("#tab-equip").innerHTML=sl;
 $("#tab-equip").querySelectorAll(".eq").forEach(b=>b.onclick=()=>equip(b.dataset.id));
 portraitCv=$("#pcv");portraitCtx=portraitCv.getContext("2d");portraitCtx.imageSmoothingEnabled=false;
}
function drawPortrait(){if(!portraitCtx||curTab!=="equip")return;portraitCtx.clearRect(0,0,64,64);
 playerOrder().forEach(k=>{const im=IMG[k];if(im&&im.complete)portraitCtx.drawImage(im,(1+pPf%8)*64,0,64,64,0,0,64,64);});} // sy=0 front
function renderDex(){
 const slots=["weapon","top","head","legs","cape"];let tot=0,got=0;let h="";
 slots.forEach(s=>{h+='<div class="dexgrp"><div class="dexglab">'+SLOTNAME[s]+'</div><div class="dexgrid">';
   POOL[s].forEach(tp=>{tot++;const k=s+":"+tp;const r=S.dex[k];const unlocked=r!=null;if(unlocked)got++;
     const c=unlocked?RAR[r].c:"#39314a";
     h+='<div class="dcell '+(unlocked?'':'locked')+'" style="--c:'+c+'">'+ICO[s]+'<div class="dn">'+(unlocked?NAMES[tp]:'???')+'</div></div>';});
   h+='</div></div>';});
 $("#tab-dex").innerHTML='<div class="invhdr"><span>도감 수집률</span><span>'+got+' / '+tot+'</span></div>'+h;
}

/* ============ misc ============ */
let toastT;function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("show");clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove("show"),2000);}
$("#pullBtn").onclick=pull;

function idleReward(){const away=Date.now()-(S.lastSeen||Date.now());if(away<60000)return;
 const cap=8*3600000;const eff=Math.min(away,cap);
 const per=Math.max(900,2600-power()*4);const k=Math.floor(eff/per);if(k<=0)return;
 const gold=Math.round(k*(3+S.wave));const exp=Math.round(k*(2+S.wave*0.6));
 S.gold+=gold;S.exp+=exp;S.kills+=k;checkLevel();
 const ov=$("#welcome");ov.innerHTML='<div class="wcard"><h3>🧟 사냥 보고</h3><p>자리를 비운 동안<br>생존자가 자동으로 사냥했어요</p>'+
  '<div class="wrow"><div>처치<b>'+k.toLocaleString()+'</b></div><div>골드<b>'+gold.toLocaleString()+'</b></div><div>경험치<b>'+exp.toLocaleString()+'</b></div></div>'+
  '<button id="wOk">받기</button></div>';ov.classList.add("show");
 $("#wOk").onclick=()=>{ov.classList.remove("show");save();updateHUD();};
}

function boot(){
 idleReward();updateHUD();renderEquip();
 requestAnimationFrame(loop);
 setInterval(()=>{updateHUD();drawPortrait();},1000);
 setInterval(save,15000);
 window.addEventListener("beforeunload",save);
}
</script></body></html>
