<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<title>좀비 헌팅 RPG · 논현 모임 v2</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sprites.js"></script>
<style>
/* ===== 리셋 & 변수 ===== */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
:root{
  --bg0:#04020d;--bg1:#0d0720;--bg2:#150e2e;
  --accent:#9b4dcc;--accent2:#c070ff;--accent3:#6b2fa0;
  --gold:#f0c040;--gold2:#ffd96b;--gold3:#c9a227;
  --green:#3ecf8e;--red:#ff5577;--blue:#4a9eff;
  --ink:#e8deff;--mut:#9080b8;--mut2:#6a5a8a;
  --line:rgba(155,77,204,0.18);--line2:rgba(155,77,204,0.32);
  --glow:rgba(155,77,204,0.35);--glow2:rgba(155,77,204,0.15);
  --card:rgba(13,7,32,0.85);--cardbg2:rgba(21,14,46,0.7);
  --r0:#9aa0aa;--r1:#46c46e;--r2:#3d8bf0;--r3:#b06ff0;--r4:#e6c964;--r5:#ff7a59;
}
body{font-family:"Pretendard Variable",Pretendard,system-ui,sans-serif;color:var(--ink);min-height:100vh;
  background:radial-gradient(ellipse 120% 80% at 50% -10%,#1a0635 0%,#0d0420 40%,#05021a 70%,#020010 100%) fixed;
  overflow-x:hidden}
.app{max-width:460px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;
  padding-bottom:calc(72px + env(safe-area-inset-bottom))}

/* ===== 상단바 ===== */
.topbar{position:sticky;top:0;z-index:30;padding:10px 14px 10px;
  background:linear-gradient(180deg,rgba(4,2,13,.97) 0%,rgba(4,2,13,.8) 100%);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--line2);
  box-shadow:0 4px 24px rgba(0,0,0,.5)}
.trow{display:flex;align-items:center;gap:8px}
.tlv{font-size:12px;font-weight:900;color:#fff;
  background:linear-gradient(135deg,var(--accent),var(--accent3));
  padding:4px 10px;border-radius:8px;letter-spacing:.5px;
  box-shadow:0 2px 10px rgba(155,77,204,.4)}
.tnet{width:7px;height:7px;border-radius:50%;background:#6b6477;flex-none;transition:background .3s}
.tpow{margin-left:auto;display:flex;align-items:center;gap:4px;font-size:13px;font-weight:900;color:var(--gold);
  background:rgba(240,192,64,.1);border:1px solid rgba(240,192,64,.2);
  padding:5px 10px;border-radius:9px;cursor:pointer;transition:all .2s}
.tpow:active{transform:scale(.97)}
.cur{display:flex;gap:10px;margin-top:8px;font-size:11.5px;font-weight:700}
.cur span{display:flex;align-items:center;gap:3px;color:var(--mut)}
.cur b{font-weight:900;color:var(--ink)}
.tbar{height:4px;border-radius:3px;background:rgba(0,0,0,.5);overflow:hidden;margin-top:8px}
.tbar i{display:block;height:100%;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  transition:width .5s cubic-bezier(.16,1,.3,1);
  box-shadow:0 0 8px var(--glow)}
.enwrap{display:flex;align-items:center;gap:8px;margin-top:7px}
.enwrap .ebar{flex:1;height:8px;border-radius:5px;background:rgba(0,0,0,.45);overflow:hidden;
  border:1px solid rgba(255,255,255,.06)}
.enwrap .ebar i{display:block;height:100%;
  background:linear-gradient(90deg,#3ecf8e,#7fe0a0);
  transition:width .4s;box-shadow:0 0 6px rgba(62,207,142,.4)}
.enwrap .etx{font-size:10px;font-weight:900;color:var(--green);min-width:36px;text-align:right}

/* ===== 공통 ===== */
.content{flex:1;padding:14px 13px 8px}
.pane{display:none}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;
  padding:15px;margin-bottom:12px;backdrop-filter:blur(8px);
  box-shadow:0 4px 20px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.04)}
.card-accent{border-left:3px solid var(--accent);padding-left:13px}
.ttl{font-size:16px;font-weight:900;display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;letter-spacing:.3px}
.ttl2{font-size:13.5px;font-weight:800;display:flex;align-items:center;gap:8px;margin-bottom:11px}
.ttl2 .muted{font-weight:700}
.muted{color:var(--mut)}.small{font-size:11.5px}
.pow2{margin-left:auto;font-size:12px;font-weight:800;color:var(--gold)}

/* ===== 버튼 ===== */
.bigbtn{width:100%;border:none;cursor:pointer;font-family:inherit;font-weight:900;font-size:15px;color:#fff;
  padding:14px;border-radius:14px;position:relative;transition:transform .15s,box-shadow .15s;
  background:linear-gradient(135deg,var(--accent),var(--accent3));
  box-shadow:0 6px 20px rgba(155,77,204,.45),inset 0 1px 0 rgba(255,255,255,.15)}
.bigbtn:active{transform:scale(.97);box-shadow:0 2px 8px rgba(155,77,204,.3)}
.bigbtn:disabled{background:rgba(50,35,70,.6);color:var(--mut2);box-shadow:none;cursor:not-allowed}
.bigbtn.gold{background:linear-gradient(135deg,#d4a820,#a07810);color:#2a1e00;
  box-shadow:0 6px 20px rgba(212,168,32,.4),inset 0 1px 0 rgba(255,255,255,.2)}
.bigbtn.alt{background:rgba(255,255,255,.06);color:var(--mut);box-shadow:none;border:1px solid var(--line)}
.bigbtn .cost{font-size:12px;opacity:.8;margin-left:6px}
.bigbtn .badge{background:var(--red);color:#fff;font-size:10.5px;padding:2px 7px;border-radius:999px;margin-left:6px}
.mini{border:none;font-family:inherit;font-weight:800;font-size:11px;color:#fff;
  background:rgba(155,77,204,.25);border:1px solid rgba(155,77,204,.4);
  padding:6px 11px;border-radius:8px;cursor:pointer;white-space:nowrap;transition:all .15s}
.mini:active{transform:scale(.95)}
.mini.gray{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.1);color:var(--mut)}
.mini.gold{background:linear-gradient(135deg,#c9a227,#9a7b15);border:none;color:#2a1e00}
.mini.risk{background:rgba(255,85,119,.18);border-color:rgba(255,85,119,.4);color:#ff9bab}
.mini:disabled{opacity:.4;cursor:not-allowed}

/* ===== 사냥 ===== */
.scene{position:relative;border-radius:14px;overflow:hidden;margin-bottom:12px;
  border:1px solid var(--line2);box-shadow:0 8px 32px rgba(0,0,0,.6)}
.scene canvas{display:block;width:100%;image-rendering:pixelated;image-rendering:crisp-edges}
.scene.boss-active{border-color:rgba(255,85,119,.5);animation:bossAlert 1.2s ease-in-out infinite}
@keyframes bossAlert{0%,100%{box-shadow:0 8px 32px rgba(0,0,0,.6)}50%{box-shadow:0 8px 32px rgba(255,85,119,.5),0 0 30px rgba(255,85,119,.2)}}
.stagebar{display:flex;align-items:flex-end;justify-content:space-between;font-size:13.5px;font-weight:700;margin-bottom:7px}
.stagebar b{color:#fff}.bossw{color:var(--red);font-weight:900;font-size:11px;margin-left:5px;animation:pulse .8s infinite alternate}
@keyframes pulse{from{opacity:.7}to{opacity:1}}
.stageprog{height:7px;border-radius:5px;background:rgba(0,0,0,.5);overflow:hidden;margin-bottom:12px;
  border:1px solid rgba(255,255,255,.05)}
.stageprog i{display:block;height:100%;
  background:linear-gradient(90deg,var(--gold3),var(--gold),var(--gold2));
  background-size:200% 100%;
  transition:width .4s;
  animation:shimmer 2s linear infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.huntbtns{display:flex;gap:10px}.huntbtns .bigbtn{flex:1}
.region-label{font-size:11.5px;font-weight:700;color:var(--mut);margin:-2px 0 8px 1px;
  display:flex;align-items:center;gap:4px}
.region-label::before{content:'📍'}

/* ===== 출석 ===== */
.attend{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:10px}
.acell{border:1px solid var(--line);border-radius:10px;padding:6px 3px;text-align:center;
  background:rgba(0,0,0,.2);transition:all .2s;position:relative;cursor:pointer}
.acell.done{background:rgba(155,77,204,.1);border-color:var(--accent3);opacity:.65}
.acell.today{background:rgba(155,77,204,.22);border-color:var(--accent);box-shadow:0 0 10px var(--glow)}
.acell .ad{font-size:9px;font-weight:700;color:var(--mut);margin-bottom:2px}
.acell .ar{font-size:11px}
.acell .ack{position:absolute;inset:0;display:grid;place-items:center;font-size:14px;background:rgba(0,0,0,.4);border-radius:9px}

/* ===== 가챠 ===== */
.pity-bar{background:rgba(155,77,204,.1);border:1px solid var(--line);border-radius:10px;
  padding:9px 12px;margin:6px 0 12px;font-size:12px;font-weight:700;color:var(--accent2)}
.pity-inner{display:flex;justify-content:space-between;align-items:center}
.pity-prog{height:4px;border-radius:3px;background:rgba(0,0,0,.4);overflow:hidden;margin-top:6px}
.pity-prog i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--red));transition:width .4s}
.rates{font-size:11px;font-weight:700;line-height:1.9;margin-bottom:14px;
  background:rgba(0,0,0,.2);border-radius:9px;padding:10px 12px;border:1px solid var(--line)}
.gbtns{display:flex;gap:10px}.gbtns .bigbtn{flex:1}

/* ===== 장비 ===== */
.equiptop{display:flex;gap:12px}
.portrait{flex:none;width:100px;background:rgba(0,0,0,.25);border:1px solid var(--line);
  border-radius:13px;display:grid;place-items:center;padding:7px;
  box-shadow:inset 0 0 20px rgba(155,77,204,.08)}
.portrait canvas{image-rendering:pixelated;width:88px}
.slots{flex:1;display:flex;flex-direction:column;gap:6px}
.slot{display:flex;align-items:center;gap:9px;background:rgba(0,0,0,.2);
  border:1px solid var(--line);border-radius:11px;padding:7px 9px;transition:border-color .2s}
.slot:has(.mini:hover){border-color:var(--accent)}
.slot .si{width:28px;height:28px;border-radius:7px;display:grid;place-items:center;flex:none;
  background:rgba(155,77,204,.15);color:var(--accent2)}
.slot .si svg{width:15px;height:15px}.sl-b{flex:1;min-width:0}
.sn{font-size:12.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ss{font-size:10px;font-weight:700;margin-top:1px}

/* ===== 보관함 필터 ===== */
.inv-filter{display:flex;gap:5px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px}
.inv-filter::-webkit-scrollbar{display:none}
.inv-filter button{flex:none;border:none;font-family:inherit;font-size:11px;font-weight:700;
  color:var(--mut);background:rgba(0,0,0,.3);border:1px solid var(--line);
  padding:6px 11px;border-radius:20px;cursor:pointer;transition:all .2s;white-space:nowrap}
.inv-filter button.on{background:rgba(155,77,204,.25);border-color:var(--accent);color:#fff}

/* ===== 인벤토리 ===== */
.invlist{display:flex;flex-direction:column;gap:7px}
.iitem{display:flex;align-items:center;gap:9px;background:rgba(0,0,0,.2);
  border:1.5px solid var(--c,#444);border-radius:12px;padding:9px 10px;
  transition:border-color .2s,background .2s}
.iitem:active{background:rgba(155,77,204,.06)}
.iitem .ii{width:32px;height:32px;border-radius:7px;display:grid;place-items:center;flex:none;
  background:rgba(0,0,0,.3);color:var(--c)}
.iitem .ii svg{width:17px;height:17px}.ib{flex:1;min-width:0}
.inm{font-size:13px;font-weight:700}.ir{font-size:10.5px;color:var(--mut);margin-top:1px}
.ir .up{color:var(--green);font-weight:900}.ir .dn{color:var(--red);font-weight:800}
.iacts{display:flex;gap:5px;flex:none}
.emptybox{text-align:center;color:var(--mut2);font-size:13px;padding:28px 14px;line-height:1.7}

/* ===== 도감 ===== */
.dexg{margin-bottom:14px}.dexgl{font-size:11px;font-weight:900;color:var(--mut);
  text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.dexgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.dcell{aspect-ratio:1;border-radius:10px;border:1.5px solid var(--c,#333);
  background:rgba(0,0,0,.2);display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:3px;color:var(--c);transition:all .2s}
.dcell svg{width:17px;height:17px}.dcell .dn{font-size:9px;font-weight:700;color:var(--mut);line-height:1}
.dcell.lock{opacity:.32}
.dcell:not(.lock){box-shadow:0 2px 8px rgba(0,0,0,.3),inset 0 0 8px color-mix(in srgb, var(--c) 15%, transparent)}

/* ===== 스킬 ===== */
.skill{display:flex;align-items:center;gap:11px;background:rgba(0,0,0,.2);
  border:1px solid var(--line);border-radius:12px;padding:11px;margin-bottom:8px;
  transition:border-color .2s}
.skill:hover{border-color:var(--accent3)}
.skill .ski{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;
  font-size:18px;flex:none;background:rgba(155,77,204,.15);
  box-shadow:0 2px 8px rgba(155,77,204,.2)}
.sk-b{flex:1}.sk-b .sn b{color:var(--gold)}

/* ===== 환생 ===== */
.rebperk{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.rebperk > div{background:rgba(0,0,0,.2);border:1px solid var(--line);border-radius:10px;
  padding:9px;font-size:12px;font-weight:700}
.rebperk > div b{color:var(--gold2)}

/* ===== 랭킹 ===== */
.seg{display:flex;gap:4px;background:rgba(0,0,0,.35);border-radius:12px;padding:4px;margin-bottom:14px;
  overflow-x:auto}.seg::-webkit-scrollbar{display:none}
.seg button{flex:1;border:none;font-family:inherit;font-weight:800;font-size:11px;color:var(--mut);
  padding:8px 4px;border-radius:8px;cursor:pointer;background:none;white-space:nowrap;transition:all .2s}
.seg button.on{background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;
  box-shadow:0 2px 8px var(--glow)}
.myrank{display:flex;align-items:center;justify-content:space-between;
  background:rgba(155,77,204,.12);border:1px solid var(--line2);border-radius:12px;
  padding:11px 14px;margin-bottom:8px;font-size:13px;font-weight:700}
.myrank b{color:var(--gold);font-size:17px}.myrank .mv{font-weight:900;color:#fff}
.chase{font-size:12px;font-weight:600;color:var(--mut);background:rgba(0,0,0,.2);
  border-radius:9px;padding:9px 12px;margin-bottom:14px;border:1px solid var(--line)}
.chase b{color:var(--ink);font-weight:800}
.podium{display:grid;grid-template-columns:1fr 1.2fr 1fr;gap:8px;align-items:end;margin-bottom:14px}
.pod{border-radius:14px;padding:13px 6px;text-align:center;position:relative;overflow:hidden}
.pod .pmed{font-size:13px;font-weight:900;margin-bottom:5px;color:var(--mut)}
.pod .pav{width:40px;height:40px;border-radius:50%;margin:0 auto 6px;display:grid;place-items:center;
  font-weight:900;font-size:16px;color:#fff;background:linear-gradient(135deg,#6a5a8a,#4a3a6a)}
.pod .pn{font-size:11px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pod .pv{font-size:11.5px;font-weight:900;margin-top:2px;color:var(--mut)}
.pod.p1{background:linear-gradient(165deg,rgba(240,192,64,.16),rgba(240,192,64,.03));
  border:1px solid rgba(240,192,64,.35);padding-top:18px}
.pod.p1 .pmed{color:var(--gold)}.pod.p1 .pv{color:var(--gold)}
.pod.p1 .pav{width:46px;height:46px;background:linear-gradient(135deg,#d4a820,#906010);color:#2a1400}
.pod.p2,.pod.p3{background:rgba(255,255,255,.03);border:1px solid var(--line)}
.pod.p3 .pav{background:linear-gradient(135deg,#b08060,#806040)}
.rlist{display:flex;flex-direction:column}
.rrow{display:flex;align-items:center;gap:10px;padding:10px 6px;
  border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s}
.rrow .rno{width:26px;text-align:center;font-weight:900;color:var(--mut2);font-size:13px}
.rrow .rnm{flex:1;font-weight:700;font-size:13px}.rrow .rmeta{color:var(--mut);font-weight:600;font-size:11px}
.rrow .rval{font-weight:900;color:var(--mut)}
.rrow.meRow{background:rgba(155,77,204,.14);border-radius:9px;border-bottom:none}
.rrow.meRow .rnm,.rrow.meRow .rval{color:#fff}
.rebbadge{background:rgba(240,192,64,.18);color:var(--gold);font-size:9.5px;font-weight:900;
  padding:1px 6px;border-radius:999px;margin-left:4px}
.arow{display:flex;align-items:center;gap:10px;padding:9px 0;
  border-bottom:1px solid rgba(255,255,255,.04)}
.arow .aav{width:36px;height:36px;border-radius:50%;display:grid;place-items:center;
  font-weight:900;color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent3));flex:none;
  font-size:14px}
.arow .ab{flex:1}.arow .anm{font-weight:700;font-size:13px}

/* ===== 랭크 dot ===== */
.rmini{display:flex;align-items:center;gap:9px;padding:7px 0;
  border-bottom:1px solid rgba(255,255,255,.04)}
.rmini .rmno{width:22px;font-size:13px;font-weight:900;color:var(--gold)}
.rmini .rmnm{flex:1;font-size:12.5px;font-weight:700}
.rmini .rmv{font-size:12.5px;font-weight:900;color:var(--mut)}
.rmini.me .rmnm,.rmini.me .rmv{color:#fff}

/* ===== 탭바 ===== */
.tabbar{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:460px;z-index:40;
  height:calc(68px + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);
  display:flex;background:rgba(4,2,13,.95);backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);border-top:1px solid var(--line2)}
.tabbtn{flex:1;border:none;background:none;cursor:pointer;font-family:inherit;display:flex;
  flex-direction:column;align-items:center;justify-content:center;gap:3px;
  color:var(--mut2);font-size:10px;font-weight:700;position:relative;transition:color .2s}
.tabbtn .ic{font-size:18px;transition:transform .2s}
.tabbtn.on{color:var(--accent2)}
.tabbtn.on .ic{transform:scale(1.15);filter:drop-shadow(0 0 6px var(--glow))}
.tabbtn::after{content:'';position:absolute;bottom:0;left:25%;right:25%;height:2px;border-radius:2px;
  background:var(--accent);opacity:0;transition:opacity .2s}
.tabbtn.on::after{opacity:1}

/* ===== 오버레이 ===== */
.overlay{position:fixed;inset:0;z-index:50;display:none;place-items:center;
  background:rgba(2,0,10,.85);backdrop-filter:blur(12px)}
.overlay.show{display:grid;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.rcard{position:relative;background:var(--bg2);border:2px solid var(--c,#444);border-radius:22px;
  padding:28px 22px;text-align:center;min-width:220px;max-width:300px;width:80vw;
  overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.7),0 0 40px color-mix(in srgb,var(--c) 30%,transparent)}
.rcard::before{content:'';position:absolute;inset:-50%;background:radial-gradient(circle,color-mix(in srgb,var(--c) 20%,transparent) 0%,transparent 70%);
  pointer-events:none;animation:rotateBg 4s linear infinite}
@keyframes rotateBg{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.rburst{position:absolute;inset:-20px;background:radial-gradient(circle,color-mix(in srgb,var(--c) 15%,transparent),transparent 70%);
  pointer-events:none;animation:burst .4s ease-out}
@keyframes burst{from{opacity:1;transform:scale(.5)}to{opacity:0;transform:scale(1.5)}}
.ribox{font-size:40px;margin-bottom:12px;position:relative;z-index:1;
  filter:drop-shadow(0 0 12px color-mix(in srgb,var(--c) 60%,transparent))}
.rr{font-size:15px;font-weight:900;color:var(--c);margin-bottom:4px;
  text-shadow:0 0 10px var(--c);position:relative;z-index:1}
.rn{font-size:20px;font-weight:900;color:#fff;margin-bottom:4px;position:relative;z-index:1}
.rs{font-size:12px;font-weight:700;color:var(--mut);margin-bottom:14px;position:relative;z-index:1}
.rp{font-size:14px;font-weight:800;color:var(--gold);margin-bottom:20px;position:relative;z-index:1}
.racts{display:flex;gap:10px;position:relative;z-index:1}.racts .rq,.racts .rc{flex:1}
.rq{border:none;font-family:inherit;font-weight:900;font-size:14px;color:#fff;cursor:pointer;
  padding:13px;border-radius:12px;
  background:linear-gradient(135deg,var(--accent),var(--accent3));
  box-shadow:0 4px 14px var(--glow)}

/* ---------- 파생 수치 ---------- */
function expNeed(){return Math.round(80*Math.pow(S.lv,1.35));}
function rebirthMul(){return 1+S.rebirth*0.25;}
function dexCount(){return Object.keys(S.dex).length;}
function dexTotal(){let t=0;for(const s in POOL)t+=POOL[s].length;return t;}
function dexBonusPct(){ // 도감 수집 + 수집가 스킬
 const base=dexCount()*1.2; const mul=1+S.skills.collect*0.25; return base*mul; }
function itemPow(it){return Math.round(it.power*(1+it.plus*0.13));}
function gearPow(){let p=0;for(const s in S.equip){const it=S.equip[s];if(it)p+=itemPow(it);}return p;}
function bestStageEff(){const raw=(S.bestRegion-1)*10+S.bestStage;return Math.min(raw,100+S.lv*14+S.rebirth*100);}
// 다른 사람의 전투력도 '그 사람의 구성요소'로 동일 공식 계산 → DB 계산식과 무관, 항상 일치
function nnum(v,d){const n=Number(v);return Number.isFinite(n)?n:(d||0);}
function calcPow(r){
 const sp=nnum(r.power,-1);
 if(sp>=0)return Math.floor(sp);                 // 서버가 계산한 power가 있으면 그 값을 신뢰(버전 차이에도 모두 동일)
 const lv=nnum(r.lv,1),reb=nnum(r.rebirth,0);    // 구버전/오프라인 fallback
 const bs=Math.min(nnum(r.best_stage,1),100+lv*14+reb*100);
 const atk=1+nnum(r.atk_lv,0)*0.06;
 const dex=1+(nnum(r.dex_count,0)*1.2*(1+nnum(r.collect_lv,0)*0.25))/100;
 return Math.floor((12+lv*6+bs*2+nnum(r.gear_power,0))*atk*dex*(1+reb*0.25));
}
function power(){
 const base=12+S.lv*6+bestStageEff()*2;   // 진행도(최고 스테이지)도 전투력에 반영
 const atk=1+S.skills.atk*0.06;
 const dex=1+dexBonusPct()/100;
 return Math.floor((base+gearPow())*atk*dex*rebirthMul());
}
function atkInterval(){return clamp(950-power()*0.6-S.skills.haste*40,260,950);}
function critChance(){return clamp(0.05+S.skills.luck*0.0,0,0.6);}

function rollRarity(){
 if(S.pity>=PITY)return 3; // 천장: 영웅 확정. 전설·신화는 천장으로도 안 나옴(극악 유지)
 const lk=S.skills.luck;
 const w=RAR.map((r,i)=>i===2?r.w*(1+lk*0.04):i===3?r.w*(1+lk*0.03):r.w); // 행운은 희귀/영웅만 소폭
 let t=w.reduce((a,b)=>a+b,0),x=Math.random()*t;
 for(let i=0;i<w.length;i++){if((x-=w[i])<=0)return i;}return 0;}
function rollSlot(){const ks=Object.keys(SLOTW);let t=0;ks.forEach(k=>t+=SLOTW[k]);let x=Math.random()*t;for(const k of ks){if((x-=SLOTW[k])<=0)return k;}return"weapon";}
function makeItem(slot){slot=slot||rollSlot();const type=pick(POOL[slot]);const r=rollRarity();
 const pw=Math.max(1,Math.round(PBASE[slot]*RAR[r].mul*(0.9+Math.random()*0.3)*(1+S.lv*0.07+S.region*0.25)));
 if(r>=3)S.pity=0;else S.pity++;
 return{id:Date.now().toString(36)+(Math.random()*1e6|0).toString(36),slot,type,rarity:r,power:pw,plus:0};}
function addDex(it){const k=it.slot+":"+it.type;S.dex[k]=Math.max(S.dex[k]==null?-1:S.dex[k],it.rarity);}
function gainItem(it,silent){
 addDex(it);
 if(S.autoSalvage>0 && it.rarity<=S.autoSalvage){doSalvage(it);return{salvaged:true,it};}
 S.inv.push(it);return{salvaged:false,it};}

function seedRand(seed){let s=seed%2147483647;if(s<=0)s+=2147483646;return()=>(s=s*16807%2147483647)/2147483647;}
let _bots=null;
function bots(){
 if(_bots)return _bots;
 const epoch=new Date(2026,5,1).getTime();
 const days=Math.max(0,(Date.now()-epoch)/86400000);
 _bots=[];
 for(let i=0;i<44;i++){
   const r=seedRand(i*733+13);
   const op=i<3;
   const handle=op?OPS[i]:HANDLES[i-3];
   const reg=REGIONS[Math.floor(r()*REGIONS.length)];
   const sex=r()<0.5?"남":"여";
   const yr=String(82+Math.floor(r()*18)).padStart(2,"0");
   const tier=op?1:Math.pow(r(),1.6); // 0~1, 낮을수록 강함(상위)
   let basePow=Math.round(40+Math.pow(1-tier,3)*5200 + (op?2500:0));
   basePow=Math.round(basePow*(1+days*0.012*(0.7+r()*0.6)));
   const lv=clamp(Math.round(3+Math.pow(basePow,0.42)),1,250);
   const bestStage=clamp(Math.round(basePow/180)+1,1,400);
   const dex=clamp(Math.round((1-tier)*dexTotal()*(0.6+r()*0.5)),0,dexTotal());
   const arena=Math.round(900+(1-tier)*2200+r()*200);
   const reb=op?0:clamp(Math.floor((1-tier)*5*(0.5+r()*0.7)),0,6);
   _bots.push({op,name:handle+"/"+reg+"/"+sex+"/"+yr,handle,pow:basePow,lv,bestStage,dex,arena,rebirth:reb});
 }
 return _bots;
}

 ["z0","z0","z1"],["z0","z1","frank"],["z1","jack","skel"],["z2","goblin","skel","frank"],["z2","vampire","alien"],["z3","troll","boarman"],["brute","wartotaur","z3","vampire"],["z0","z1","goblin"],["z1","z2","skel"],["z2","frank","vampire"],["z3","alien","wartotaur"],["vampire","z3","goblin"],["troll","boarman","z2"],["brute2","wartotaur","troll"]
];
const BOSS_BY_REGION=["brute2","troll","boarman","wartotaur"];
const BIGENEMY=["brute","troll","boarman","wartotaur","brute2"];
const REGION_NAME=["폐허가 된 논현 밤거리","감염된 공원","지하 주차장","무너진 병원","봉쇄된 지하철","변종 연구소","최후의 방어선","강남역 광장","코엑스 지하","압구정 로데오","한남대교 위","이태원 골목","용산 기지","잠실 롯데타워"];
const RTHEME=[["#3a1a52","#160a24"],["#173a2a","#08180f"],["#3a2a14","#180f06"],["#3a1622","#180610"],["#16273a","#06121c"],["#241640","#0e0622"],["#3a1a52","#160a24"],["#2a1640","#0e0618"],["#1a2a3a","#060e18"],["#3a1a2a","#180610"],["#1a3a2a","#06180e"],["#3a2a1a","#180e06"],["#1a1a3a","#060618"],["#2a0a1a","#120006"]];
function rtheme(){return RTHEME[(S.region-1)%RTHEME.length]||RTHEME[0];}
function regionLabel(){return REGION_NAME[(S.region-1)%REGION_NAME.length]||REGION_NAME[0];}
function enemyType(){
 if(S.stage>=10){const b=BOSS_BY_REGION[(S.region-1)%BOSS_BY_REGION.length];return{art:[b],boss:true,sc:ZSCALE*1.6};}
 const pool=REGION_ENEMY[(S.region-1)%REGION_ENEMY.length]||REGION_ENEMY[0];
 const art=[pick(pool)];const big=BIGENEMY.includes(art[0]);
 return{art,boss:false,sc:big?ZSCALE*1.3:(art[0]==="goblin"?ZSCALE*0.82:ZSCALE)};}
function enemyHP(boss){return Math.round((18+S.region*22+S.stage*6)*(boss?6:1)*(1+S.bestRegion*0.05));}
function spawn(){if(S.stage>=10&&zombies.some(z=>z.boss))return;
 const e=enemyType();const hp=enemyHP(e.boss);
 zombies.push({x:W+20+Math.random()*30,art:e.art,boss:e.boss,sc:e.sc,hp,maxhp:hp,f:1,ft:0,flash:0});}
function update(dt){
 regen();rollDaily();
 spawnT-=dt;const maxZ=S.stage>=10?1:4;
 if(spawnT<=0&&zombies.length<maxZ){spawn();spawnT=S.stage>=10?9999:Math.max(500,1500-S.region*40);}
 zombies.sort((a,b)=>a.x-b.x);
 zombies.forEach((z,i)=>{const tx=playerX+56+i*26;
   if(z.x>tx){z.x-=(22+S.region)*dt/1000;if(z.x<tx)z.x=tx;}
   z.ft+=dt;if(z.ft>110){z.ft=0;z.f=z.f>=8?1:z.f+1;}
   if(z.flash>0)z.flash-=dt;});
 atkCd-=dt;
 const tgt=zombies.find(z=>z.x<=playerX+74);
 if(tgt&&atkCd<=0){let dmg=Math.max(3,Math.round(power()*0.8));const crit=Math.random()<critChance();if(crit)dmg=Math.round(dmg*1.8);
   tgt.hp-=dmg;tgt.flash=120;slashFx=140;lunge=110;
   pops.push({x:tgt.x,y:BASE-72,txt:(crit?"⚡":"")+fmt(dmg),t:0,c:crit?"#ffe08a":"#fff"});
   atkCd=atkInterval();if(tgt.hp<=0)kill(tgt);}
 if(slashFx>0)slashFx-=dt;if(lunge>0)lunge-=dt;
 pops.forEach(p=>p.t+=dt);pops=pops.filter(p=>p.t<820);
 pt+=dt;if(pt>150){pt=0;pf=(pf+1)%8;}
 if(comboT>0){comboT-=dt;if(comboT<=0)combo=0;}}
function kill(z){zombies=zombies.filter(x=>x!==z);
 combo++;comboT=2800;
 const m=z.boss?8:1,wm=wealthMul(),cm=1+Math.min(combo,25)*0.04;
 const gold=Math.round((5+S.region*4+S.stage)*(0.85+Math.random()*0.3)*m*wm*cm);
 const exp=Math.round((4+S.region*2.2+S.stage*0.6)*(0.85+Math.random()*0.3)*m);
 const stone=z.boss?Math.round((6+S.region*2)*wm):(Math.random()<0.25?Math.round(1+S.region*0.5):0);
 S.gold+=gold;S.exp+=exp;S.stones+=stone;S.kills++;S.daily.kills++;S.keCtr++;
 pops.push({x:z.x,y:BASE-94,txt:"+"+fmt(gold)+"G",t:0,c:"#ffd96b"});
 if(S.keCtr>=5){S.keCtr=0;if(S.energy<MAXE){if(S.energy>=MAXE-1)S.lastEnergyAt=Date.now();S.energy=Math.min(MAXE,S.energy+1);}}
 const drop=z.boss?0.9:0.13+S.skills.luck*0.01;
 if(Math.random()<drop){const it=makeItem();const r=gainItem(it,true);
   if(!r.salvaged)toast("전리품 · "+RAR[it.rarity].k+" "+NAMES[it.type]);}
 // 스테이지 진행
 if(z.boss){S.region++;S.stage=1;zombies=[];spawnT=300;toast("🏆 보스 처치! "+regionLabel()+" 진입");}
 else{S.stageKC=(S.stageKC||0)+1;if(S.stageKC>=STAGE_KILLS){S.stageKC=0;S.stage=Math.min(10,S.stage+1);}}
 const cr=(S.region-1)*10+S.stage;const br=(S.bestRegion-1)*10+S.bestStage;
 if(cr>br){S.bestRegion=S.region;S.bestStage=S.stage;}
 if(checkLevel())toast("레벨 업! Lv."+S.lv+" (스킬 포인트 +1)");
 _bots=null; // 랭킹 갱신 트리거(전투력 변동)
 if(NET.ready)netSubmit(false);
 updateTop();save();}
function regionName(){return "지역 "+S.region;}
function drawScene(){if(!ctx)return;
 ctx.clearRect(0,0,W,H);
 const th=rtheme();const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,th[0]);g.addColorStop(1,th[1]);
 ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
 ctx.strokeStyle="rgba(160,95,208,.16)";ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,BASE+2);ctx.lineTo(W,BASE+2);ctx.stroke();
 [...zombies].sort((a,b)=>b.x-a.x).forEach(z=>{const dx=z.x-32*z.sc,dy=BASE-64*z.sc;
   z.art.forEach(k=>drawL(k,z.f,0,dx,dy,z.sc));
   if(z.flash>0){ctx.save();ctx.globalCompositeOperation="source-atop";}
   if(z.hp<z.maxhp){const bw=30*z.sc/2.1;ctx.fillStyle="rgba(0,0,0,.5)";ctx.fillRect(z.x-bw/2,dy-6,bw,4);
     ctx.fillStyle=z.boss?"#e6c964":"#ff5d6c";ctx.fillRect(z.x-bw/2,dy-6,bw*Math.max(0,z.hp/z.maxhp),4);}
   if(z.flash>0)ctx.restore();});
 const lx=playerX+(lunge>0?9:0),dx=lx-32*PSCALE,dy=BASE-64*PSCALE;
 playerOrder().forEach(k=>drawL(k,1+(pf%8),64,dx,dy,PSCALE));
 if(slashFx>0){ctx.save();ctx.globalAlpha=slashFx/140;ctx.strokeStyle="#fff";ctx.lineWidth=3;
   ctx.beginPath();ctx.arc(lx+42,BASE-56,30,-0.85,0.85);ctx.stroke();
   ctx.strokeStyle="rgba(214,166,240,.8)";ctx.lineWidth=6;ctx.beginPath();ctx.arc(lx+42,BASE-56,30,-0.55,0.55);ctx.stroke();ctx.restore();}
 if(combo>=3){ctx.save();ctx.globalAlpha=Math.min(1,comboT/2800+.35);ctx.textAlign="center";ctx.font="900 17px Pretendard,sans-serif";ctx.fillStyle="#ffd96b";ctx.fillText(combo+" COMBO",W/2,24);ctx.restore();}
 ctx.textAlign="center";ctx.font="bold 14px Pretendard,sans-serif";
 pops.forEach(p=>{ctx.save();ctx.globalAlpha=Math.max(0,1-p.t/820);ctx.fillStyle=p.c;ctx.fillText(p.txt,p.x,p.y-p.t/15);ctx.restore();});}
let last=0;
function loop(t){const dt=Math.min(60,t-last||16);last=t;update(dt);if(sceneActive)drawScene();requestAnimationFrame(loop);}

let RBOARD="pow";
function rebTag(n){return n>0?' <span class="rebbadge">✦'+n+'환생</span>':'';}
function renderRank(){
 const boards=[["pow","전투력"],["rebirth","환생"],["lv","레벨"],["bestStage","스테이지"],["dex","도감"],["arena","아레나"]];
 const metric=RBOARD;
 const list=board(metric);
 const myr=list.findIndex(x=>x.me)+1;
 const valLab=v=>metric==="pow"?fmt(v):metric==="rebirth"?v+"환생":metric==="lv"?"Lv."+v:metric==="bestStage"?v+"단계":metric==="dex"?v+"종":fmt(v)+"점";
 let s='<div class="card"><div class="ttl2">랭킹</div>'+
  '<div class="seg">'+boards.map(b=>'<button class="'+(b[0]===metric?'on':'')+'" data-b="'+b[0]+'">'+b[1]+'</button>').join("")+'</div>';
 if(NET.ready){if(!NET.nick)s+='<button class="bigbtn" id="joinRank" style="margin-bottom:12px">🏆 랭킹 참가하기 (닉네임 설정)</button>';
  else s+='<div style="display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.04);border-radius:10px;padding:9px 12px;margin-bottom:12px;font-size:12.5px;font-weight:700">랭킹 닉 <b style="color:#fff">'+NET.nick+'</b><button class="mini gray" id="chgNick" style="margin-left:auto">변경</button></div>';}
 if(NET.banned)s+='<div style="font-size:12px;font-weight:700;color:#f0a8bd;background:rgba(192,71,107,.16);border-radius:9px;padding:10px 12px;margin-bottom:12px">⚠ 운영진에 의해 랭킹 집계에서 제외된 계정입니다.</div>';
 // 내 순위 강조
 const me0=list[myr-1];
 s+='<div class="myrank"><div>내 순위 <b>#'+myr+'</b> / '+list.length+(S.rebirth>0?' · <span style="color:#ffd96b">✦'+S.rebirth+'환생</span>':'')+'</div><div class="mv">'+valLab(me0.val)+'</div></div>';
 if(myr>1){const up=list[myr-2];const diff=up.val-me0.val;
  s+='<div class="chase">⬆ <b>'+up.handle+'</b> 님이 '+(metric==="pow"?fmt(diff)+' 전투력':valLab(up.val))+' 앞서 있어요'+(metric==="pow"&&diff>0?' (+'+fmt(diff)+')':'')+'</div>';}
 // 포디움 top3
 s+='<div class="podium">';
 [1,0,2].forEach(rankIdx=>{const e=list[rankIdx];if(!e)return;const medal=["①","②","③"][rankIdx];
  s+='<div class="pod p'+(rankIdx+1)+(e.rebirth>0?' reb':'')+'"><div class="pmed">'+medal+'</div><div class="pav">'+e.handle.slice(0,1)+'</div>'+
  '<div class="pn">'+e.handle+(e.op?' 👑':'')+(e.me?' (나)':'')+'</div>'+(e.rebirth>0?'<div class="prb">✦'+e.rebirth+'환생</div>':'')+'<div class="pv">'+valLab(e.val)+'</div></div>';});
 s+='</div>';
 // 리스트
 s+='<div class="rlist">';
 list.slice(0,30).forEach((e,i)=>{
  s+='<div class="rrow'+(e.me?' meRow':'')+(e.rebirth>0?' hasReb':'')+'"><div class="rno">'+(i+1)+'</div><div class="rnm">'+e.handle+(e.op?' <span class="op">👑</span>':'')+rebTag(e.rebirth)+'<span class="rmeta"> Lv.'+e.lv+'</span></div><div class="rval">'+valLab(e.val)+'</div></div>';});
 s+='</div>';
 if(myr>30){s+='<div class="rrow meRow'+(me0.rebirth>0?' hasReb':'')+'"><div class="rno">'+myr+'</div><div class="rnm">'+me0.handle+' (나)'+rebTag(me0.rebirth)+'<span class="rmeta"> Lv.'+me0.lv+'</span></div><div class="rval">'+valLab(me0.val)+'</div></div>';}
 s+='<p class="muted small" style="text-align:center;margin-top:8px">👑 운영진은 경쟁 집계에서 제외돼요</p>';
 s+='</div>';
 // 아레나
 const ops=arenaOpponents();const onCd=(S.arenaCdUntil||0)>Date.now();
 s+='<div class="card"><div class="ttl2">아레나 <span class="muted">'+S.arenaPts+'점 · '+myRank("arena")+'위</span></div>'+
  '<p class="muted small">3시간마다 1회 도전 · 비슷한 전투력 구성원에게 도전하세요.</p>'+
  (onCd?'<div style="font-size:12px;font-weight:700;color:#f0a8bd;background:rgba(192,71,107,.14);border-radius:9px;padding:9px 12px;margin:2px 0 8px">⏳ 다음 도전까지 '+arenaCdLeft()+'</div>':'');
 ops.forEach(o=>{s+='<div class="arow"><div class="aav">'+o.handle.slice(0,1)+'</div><div class="ab"><div class="anm">'+o.handle+(o.op?' 👑':'')+'</div><div class="muted small">전투력 '+fmt(o.pow)+' · '+o.arena+'점</div></div>'+
  '<button class="mini '+(onCd?'gray':power()>=o.pow?'':'risk')+'" '+(onCd?'disabled':'')+' data-ar="'+o.name+'">도전</button></div>';});
 s+='</div>';
 setHTML("#p-rank",s);
 $$('#p-rank [data-b]').forEach(b=>b.onclick=()=>{RBOARD=b.dataset.b;renderRank();});
 $$('#p-rank [data-ar]').forEach(b=>b.onclick=()=>{const o=ops.find(x=>x.name===b.dataset.ar);if(o)arenaFight(o);});
 const jr=$("#joinRank");if(jr)jr.onclick=promptNick;
 const cn=$("#chgNick");if(cn)cn.onclick=promptNick;
}

/* ---------- 오버레이 ---------- */
function reveal(items){
 const ov=$("#ov-reveal");if(!ov)return;
 if(items.length===1){const it=items[0];const c=RAR[it.rarity].c;
  ov.innerHTML='<div class="rcard" style="--c:'+c+'"><div class="rburst"></div><div class="ribox">'+ICO[it.slot]+'</div>'+
   '<div class="rr">'+RAR[it.rarity].k+'</div><div class="rn">'+NAMES[it.type]+'</div><div class="rs">'+SLOTNAME[it.slot]+'</div>'+
   '<div class="rp">전투력 +'+itemPow(it)+'</div><div class="racts"><button class="rq" id="rEq">장착</button><button class="rc" id="rC">보관</button></div></div>';
  ov.classList.add("show");fxRarity(it.rarity,ov);
  const eq=$("#rEq");if(eq)eq.onclick=()=>{equip(it.id);ov.classList.remove("show");};
  const cc=$("#rC");if(cc)cc.onclick=()=>{ov.classList.remove("show");renderTab();};
 }else{
  let best=0;items.forEach(it=>{if(it.rarity>best)best=it.rarity;});
  let grid=items.map(it=>{const c=RAR[it.rarity].c;return '<div class="mcell" style="--c:'+c+'">'+ICO[it.slot]+'<div class="mn">'+NAMES[it.type]+'</div><div class="mr" style="color:'+c+'">'+RAR[it.rarity].k+'</div></div>';}).join("");
  ov.innerHTML='<div class="tcard"><div class="tt">10연 결과</div><div class="mgrid">'+grid+'</div><button class="rq" id="tC">확인</button></div>';
  ov.classList.add("show");fxRarity(best,ov);
  const tc=$("#tC");if(tc)tc.onclick=()=>{ov.classList.remove("show");renderTab();};
 }
}
function fxRarity(r,ov){
 if(r>=4){const f=$("#flash");if(f){f.classList.remove("go");void f.offsetWidth;f.classList.add("go");}}
 if(r>=3){const card=ov.querySelector(".rcard")||ov.querySelector(".tcard");if(!card)return;const n=r>=4?18:10;
  for(let i=0;i<n;i++){const a=Math.random()*6.28,d=80+Math.random()*100;const p=document.createElement("div");p.className="rpar";
   p.style.cssText="--tx:"+Math.cos(a)*d+"px;--ty:"+Math.sin(a)*d+"px;animation-delay:"+(Math.random()*.1)+"s";card.appendChild(p);}}
}
function openMissions(){rollDaily();const ov=$("#ov-modal");if(!ov)return;
 let s='<div class="mcard"><div class="tt">📋 일일 미션 <span class="muted small">매일 0시 초기화</span></div>';
 DAILY.forEach(m=>{const cur=Math.min(m.get(),m.goal);const done=cur>=m.goal;const claimed=S.daily.claimed[m.id];
  const rw=m.rw.gems?'💎'+m.rw.gems:m.rw.stones?'💠'+m.rw.stones:'🪙'+fmt(m.rw.gold);
  s+='<div class="mrow"><div class="mb"><div class="mn2">'+m.n+'</div><div class="mbar"><i style="width:'+(cur/m.goal*100)+'%"></i></div><div class="muted small">'+cur+' / '+m.goal+' · 보상 '+rw+'</div></div>'+
   '<button class="mini '+(claimed?'gray':done?'gold':'')+'" '+(claimed||!done?'disabled':'')+' data-cl="'+m.id+'">'+(claimed?'완료':'수령')+'</button></div>';});
 s+='<button class="rc" id="mClose">닫기</button></div>';
 ov.innerHTML=s;ov.classList.add("show");
 $$('#ov-modal [data-cl]').forEach(b=>b.onclick=()=>{claimDaily(b.dataset.cl);openMissions();});
 const mc=$("#mClose");if(mc)mc.onclick=()=>ov.classList.remove("show");
}

/* ---------- 토스트 ---------- */
let tT;function toast(m){const t=$("#toast");if(!t)return;t.textContent=m;t.classList.add("show");clearTimeout(tT);tT=setTimeout(()=>t.classList.remove("show"),1900);}

/* ---------- 방치 보상 ---------- */
function idleReward(){const away=Date.now()-(S.lastSeen||Date.now());if(away<60000)return;
 const eff=Math.min(away,idleCapH()*3600000);const per=Math.max(600,2400-power()*1.2);const k=Math.floor(eff/per);if(k<=0)return;
 const wm=wealthMul();const rb=1+S.rebirth*0.1;
 const gold=Math.round(k*(5+S.region*4)*wm),exp=Math.round(k*(4+S.region*2)*rb),stone=Math.round(k*0.4*wm);
 S.gold+=gold;S.exp+=exp;S.stones+=stone;S.kills+=k;checkLevel();
 const ov=$("#ov-modal");if(!ov)return;
 ov.innerHTML='<div class="mcard wc"><div class="tt">🧟 사냥 보고</div><p class="muted">자리를 비운 동안 생존자가 자동으로 사냥했어요</p>'+
  '<div class="wrow"><div>처치<b>'+fmt(k)+'</b></div><div>골드<b>'+fmt(gold)+'</b></div><div>경험치<b>'+fmt(exp)+'</b></div><div>강화석<b>'+fmt(stone)+'</b></div></div>'+
  '<button class="rq" id="wOk">받기</button></div>';ov.classList.add("show");
 const w=$("#wOk");if(w)w.onclick=()=>{ov.classList.remove("show");save();updateTop();renderTab();};}

/* ---------- 부팅 ---------- */
function bindNav(){$$(".tabbtn").forEach(b=>b.onclick=()=>go(b.dataset.t));
 const pb=$("#tPowBox");if(pb)pb.onclick=()=>{toast("전투력 = 레벨+장비+강화+스킬+도감+환생");};}
function start(){
 cv=$("#cv");if(cv){ctx=cv.getContext("2d");ctx.imageSmoothingEnabled=false;W=cv.width;H=cv.height;BASE=H-18;}
 bindNav();rollDaily();idleReward();updateTop();go("hunt");
 netInit().catch(()=>{});
 requestAnimationFrame(loop);
 setInterval(()=>{updateTop();drawPortrait();if(TAB==="hunt")renderHunt();},1000);
 setInterval(save,12000);
 if(typeof window!=="undefined"){window.addEventListener("beforeunload",save);document.addEventListener("visibilitychange",()=>{if(document.visibilityState==="hidden")save();});}
}
function boot(){loadImages(start);}

/* 노출(테스트/디버그) */
window.GAME={boot,pull,pull10,equip,enhance,salvage,salvageAll,learn,rebirth,arenaFight,arenaOpponents,board,renderRank,renderEquip,renderGrow,renderGacha,renderHunt,renderHuntExtra,claimAttend,claimChest,idleReward,go,bots,power,
 tick:n=>{for(let i=0;i<(n||1);i++)update(16);},draw:()=>drawScene(),openMissions,
 liveBoard,calcPow,_net:NET,_setRoster:(arr,uid)=>{NET.ready=true;NET.roster=arr;NET.uid=uid||"me";},get S(){return S;},set S(v){S=v;}};

if(typeof document!=="undefined"&&document.addEventListener)document.addEventListener("DOMContentLoaded",boot);
})();

// 보관함 필터 상태
let invFilter='all';

// renderEquip 확장 (필터 추가)
const _origRenderEquip=renderEquip;
function renderEquip(){
  _origRenderEquip();
  // 필터 UI 주입
  const invSection=document.querySelector('#p-equip .card:nth-child(2)');
  if(!invSection)return;
  const ttlEl=invSection.querySelector('.ttl2');
  if(ttlEl&&!invSection.querySelector('.inv-filter')){
    const slots=['all','weapon','top','head','legs','cape'];
    const labels={'all':'전체','weapon':'⚔️','top':'🎽','head':'⛑️','legs':'👖','cape':'🧥'};
    const fDiv=document.createElement('div');
    fDiv.className='inv-filter';
    fDiv.innerHTML=slots.map(s=>`<button class="${invFilter===s?'on':''}" data-f="${s}">${labels[s]}</button>`).join('');
    invSection.insertBefore(fDiv,invSection.querySelector('.invlist')||invSection.querySelector('.emptybox'));
    fDiv.querySelectorAll('[data-f]').forEach(b=>b.onclick=()=>{invFilter=b.dataset.f;renderEquip();});
  }
}

// 보스 화면 효과
const _origGo=go;
function go(tab){
  _origGo(tab);
  if(tab==='hunt'){
    const sc=document.getElementById('sceneEl');
    if(sc)sc.classList.toggle('boss-active',window.GAME&&S&&S.stage>=10);
  }
}

// setBanner 개선 (발광)
function setBanner(on){
  const e=document.getElementById('netDot');
  if(e){
    e.style.background=on?'#3ecf8e':'#6b6477';
    e.style.boxShadow=on?'0 0 6px rgba(62,207,142,.6)':'none';
    e.title=on?'실시간 랭킹 연결됨':'오프라인(봇 랭킹)';
  }
}

// pity 프로그레스 바 추가 렌더
const _origRenderGacha=renderGacha;
function renderGacha(){
  _origRenderGacha();
  // pity 바 교체
  const pityEl=document.querySelector('#p-gacha .pity');
  if(pityEl){
    const pct=Math.round(S.pity/70*100);

  }
}
